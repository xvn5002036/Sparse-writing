<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>道教疏文排版系統 (網頁版)</title>

    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- 引入 Babel 用於瀏覽器內編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 高級版所需套件 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://unpkg.com/lunar-javascript/lunar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

    <style>
        /* 全局字體設定 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');

        body {
            font-family: "KaiTi", "BiauKai", "DFKai-SB", "標楷體", "Noto Serif TC", serif;
            overscroll-behavior: none;
            /* 防止手機下拉重整 */
        }

        /* 隱藏捲軸但保留功能 */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 列印樣式控制：極致清潔版 */
        @media print {
            @page {
                margin: 0;
                size: auto;
            }

            /* 隱藏主介面組件 */
            body header,
            body nav,
            body footer,
            body aside,
            body .modal-header,
            body .modal-footer,
            body button,
            body .print\:hidden,
            body [class*="print:hidden"] {
                display: none !important;
            }

            /* 核心修正：絕對零邊距對齊，解除所有父層容器的位移因素 */
            html,
            body {
                margin: 0 !important;
                padding: 0 !important;
                background: #fff !important;
            }

            #root,
            #root>div,
            .fixed,
            .inset-0,
            .print-override,
            [class*="max-h"],
            [class*="overflow-"] {
                height: auto !important;
                min-height: 0 !important;
                max-height: none !important;
                overflow: visible !important;
                position: static !important;
                margin: 0 !important;
                padding: 0 !important;
                display: block !important;
                width: 100% !important;
                gap: 0 !important;
                transform: none !important;
                box-shadow: none !important;
            }

            /* 紙張樣式：絕對定位補償，確保內容不跑位 */
            .paper-bg {
                background-color: #fff !important;
                margin: 0 !important;
                padding: 0 !important;
                box-shadow: none !important;
                transform: none !important;
                break-after: page !important;
                break-inside: avoid !important;
                display: block !important;
                position: relative !important;
                visibility: visible !important;
                left: 0 !important;
                top: 0 !important;
                box-sizing: border-box !important;
                height: 99vh !important;
                max-height: 99vh !important;
                overflow: hidden !important;
            }

            .paper-bg:last-child {
                break-after: avoid !important;
            }

            svg,
            img {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>

<body class="bg-gray-200 h-screen w-screen overflow-hidden select-none touch-none text-gray-800">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- 圖示元件 ---
        const Icon = ({ name, size = 18, color = "currentColor", className = "" }) => {
            const paths = {
                printer: <><polyline points="6 9 6 2 18 2 18 9" /><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" /><rect x="6" y="14" width="12" height="8" /></>,
                settings: <><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></>,
                trash: <><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></>,
                reset: <><polyline points="1 4 1 10 7 10" /><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" /></>,
                check: <polyline points="20 6 9 17 4 12" />,
                menu: <><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="18" x2="21" y2="18" /></>,
                edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" /></>,
                copy: <><rect x="9" y="9" width="13" height="13" rx="2" ry="2" /><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" /></>,
                paste: <><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" /><rect x="8" y="2" width="8" height="4" rx="1" ry="1" /></>,
                layout: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2" /><line x1="3" y1="9" x2="21" y2="9" /><line x1="9" y1="21" x2="9" y2="9" /></>,
                zoomIn: <><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /><line x1="11" y1="8" x2="11" y2="14" /><line x1="8" y1="11" x2="14" y2="11" /></>,
                zoomOut: <><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /><line x1="8" y1="11" x2="14" y2="11" /></>,
                layers: <><polygon points="12 2 2 7 12 12 22 7 12 2" /><polyline points="2 17 12 22 22 17" /><polyline points="2 12 12 17 22 12" /></>,
                plus: <><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></>,
                lock: <><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></>,
                unlock: <><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 9.9-1" /></>,
                image: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2" /><circle cx="8.5" cy="8.5" r="1.5" /><polyline points="21 15 16 10 5 21" /></>,
                x: <><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></>,
                chevronUp: <polyline points="18 15 12 9 6 15" />,
                chevronDown: <polyline points="6 9 12 15 18 9" />,
                arrowRight: <><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></>,
                arrowDown: <><line x1="12" y1="5" x2="12" y2="19" /><polyline points="19 12 12 19 5 12" /></>,
                undo: <><path d="M3 7v6h6" /><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13" /></>,
                redo: <><path d="M21 7v6h-6" /><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7" /></>,
                save: <><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" /><polyline points="17 21 17 13 7 13 7 21" /><polyline points="7 3 7 8 15 8" /></>,
                folder: <><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" /></>,
                alignCenter: <><line x1="12" y1="2" x2="12" y2="22" /><rect x="6" y="8" width="12" height="8" rx="1" /></>,
                layerUp: <><polyline points="18 15 12 9 6 15" /><line x1="12" y1="9" x2="12" y2="21" /></>,
                layerDown: <><polyline points="6 9 12 15 18 9" /><line x1="12" y1="3" x2="12" y2="15" /></>,
                grid: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2" /><line x1="3" y1="9" x2="21" y2="9" /><line x1="3" y1="15" x2="21" y2="15" /><line x1="9" y1="3" x2="9" y2="21" /><line x1="15" y1="3" x2="15" y2="21" /></>,
                scan: <><path d="M3 7V5a2 2 0 0 1 2-2h2" /><path d="M17 3h2a2 2 0 0 1 2 2v2" /><path d="M21 17v2a2 2 0 0 1-2 2h-2" /><path d="M7 21H5a2 2 0 0 1-2-2v-2" /></>
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{paths[name] || null}</svg>;
        };

        // --- 共用：處理變數點擊 ---
        const handleVariableClick = (varName, currentBlock, updateBlock, addBlock) => {
            if (currentBlock && (currentBlock.type === 'text' || currentBlock.type === 'grid_list')) {
                const key = currentBlock.type === 'text' ? 'text' : 'template';
                updateBlock(key, (currentBlock[key] || '') + `{{${varName}}}`);
            } else {
                addBlock('text', `{{${varName}}}`);
            }
        };

        // --- 共用：變數快捷按鈕 ---
        const VariableButtonList = ({ onInsert, batchData = [] }) => {
            const defaultVars = ['姓名', '地址', '電話', '捐獻金額', '農曆日期'];
            const headers = batchData.length > 0 ? Object.keys(batchData[0]) : defaultVars;
            return (
                <div className="flex flex-wrap gap-1 mt-1">
                    {headers.map(h => (
                        <button key={h} onClick={() => onInsert(h)} className="px-1.5 py-0.5 bg-blue-50 text-blue-600 border border-blue-200 rounded text-[10px] hover:bg-blue-100 transition-colors">
                            {h}
                        </button>
                    ))}
                </div>
            );
        };

        // --- 共用：紙張內容渲染器 ---
        const PaperContent = ({ blocks, selectedId, showPreview, batchData = [], onMouseDown, onTouchStart, onContextMenu }) => {
            return (
                <React.Fragment>
                    {blocks.map((block) => (
                        <div
                            key={block.id}
                            id={`block-${block.id}`}
                            onMouseDown={(e) => onMouseDown && onMouseDown(e, block.id)}
                            onTouchStart={(e) => onTouchStart && onTouchStart(e, block.id)}
                            onContextMenu={(e) => onContextMenu && onContextMenu(e, block.id)}
                            className={`absolute p-1 z-10 
                                ${!showPreview && block.locked ? 'border border-transparent' : ''}
                                ${!showPreview && !block.locked ? 'cursor-move' : ''} 
                                ${!showPreview && selectedId === block.id && !block.locked ? 'outline outline-2 outline-blue-600' : ''}
                            `}
                            style={{
                                left: `${block.x}%`,
                                top: `${block.y}%`,
                                width: (block.type === 'image' || block.type === 'grid_list' || block.type === 'qr_code') ? `${block.width}px` : 'auto',
                                height: (block.type === 'grid_list') ? `${block.height}px` : 'auto',
                                fontSize: (block.type === 'text' || block.type === 'grid_list') ? `${block.fontSize}px` : undefined,
                                fontWeight: block.fontWeight,
                                color: block.color,
                                writingMode: block.writingMode,
                                whiteSpace: 'pre-wrap',
                                lineHeight: block.lineHeight || '1.5',
                                opacity: block.opacity || 1,
                                userSelect: 'none',
                                WebkitUserSelect: 'none',
                                fontFamily: '"KaiTi", "BiauKai", "DFKai-SB", "楷體", serif'
                            }}
                        >
                            {block.type === 'text' && block.text}
                            {block.type === 'image' && <img src={block.src} alt="content" className="w-full h-auto pointer-events-none select-none" />}
                            {block.type === 'qr_code' && <img src={`https://api.qrserver.com/v1/create-qr-code/?size=${Math.round(block.width)}x${Math.round(block.width)}&data=${encodeURIComponent(block.url)}`} alt="QR Code" className="w-full h-auto pointer-events-none select-none" />}

                            {/* 高級版 V2：連續名單動態網格 */}
                            {block.type === 'grid_list' && (
                                <div className="w-full h-full flex" style={{
                                    flexDirection: block.writingMode.includes('vertical') ? 'row-reverse' : 'column',
                                    flexWrap: 'wrap',
                                    alignContent: 'flex-start'
                                }}>
                                    {/* 優先顯示 CSV 實際資料，若無資料則在編輯時顯示預設文字 */}
                                    {((batchData.length > 0 ? batchData : Array.from({ length: block.gridRows * block.gridCols }))).map((item, idx) => {
                                        // 只渲染這個區塊裝得下的數量 (除非我們後續做分頁)
                                        if (idx >= block.gridRows * block.gridCols) return null;

                                        let cellText = (batchData.length > 0) ? block.template : "信士 OOO";
                                        if (batchData.length > 0) {
                                            Object.keys(item).forEach(k => {
                                                cellText = cellText.replace(new RegExp(`\\{\\{${k}\\}\\}`, 'g'), item[k] || '');
                                            });
                                        }

                                        return (
                                            <div key={idx} className="flex flex-col items-center justify-start border-dashed border-gray-300" style={{
                                                width: block.writingMode.includes('vertical') ? `${100 / block.gridCols}%` : '100%',
                                                height: block.writingMode.includes('vertical') ? '100%' : `${100 / block.gridRows}%`,
                                                borderWidth: !showPreview ? '1px' : '0px',
                                                padding: '2px'
                                            }}>
                                                {block.showSeparator && idx > 0 && <div className="text-red-600 text-[8px] mb-1">●</div>}
                                                <div style={{ writingMode: block.writingMode }}>{cellText}</div>
                                            </div>
                                        )
                                    })}
                                </div>
                            )}

                            {!showPreview && block.locked && (
                                <div className="absolute -top-2 -right-2 bg-white rounded-full p-0.5 shadow print:hidden">
                                    <Icon name="lock" color="#ef4444" size={14} />
                                </div>
                            )}
                        </div>
                    ))}

                    {!showPreview && (
                        <div className="absolute inset-4 border-4 border-double border-red-800 pointer-events-none opacity-50 z-0"></div>
                    )}
                </React.Fragment>
            );
        };

        const App = () => {
            // --- 初始位置設定 (更分散) ---
            const initialBlocks = [
                { id: 't1', type: 'text', text: "祈福消災文疏", x: 88, y: 15, fontSize: 48, writingMode: 'vertical-rl', color: '#b91c1c', fontWeight: 'bold', locked: false },
                { id: 't2', type: 'text', text: "伏以", x: 80, y: 18, fontSize: 24, writingMode: 'vertical-rl', color: '#000000', fontWeight: 'normal', locked: false },
                { id: 't3', type: 'text', text: "神恩浩蕩，澤被蒼生。\n今據\n居住於 台灣省OO市\n信士 OOO \n虔備香花果品。\n敢昭告於\n三清道祖 案前曰：\n誠惶誠恐，稽首頓首。\n伏願\n神光普照，元辰光彩。\n謹疏上聞。", x: 50, y: 18, fontSize: 24, writingMode: 'vertical-rl', color: '#000000', fontWeight: 'normal', lineHeight: '2em', locked: false },
                { id: 't4', type: 'text', text: "天運歲次 甲辰 年 正 月 十五 日", x: 18, y: 55, fontSize: 20, writingMode: 'vertical-rl', color: '#000000', fontWeight: 'normal', locked: false },
                { id: 't5', type: 'text', text: "具疏叩謝", x: 8, y: 75, fontSize: 20, writingMode: 'vertical-rl', color: '#000000', fontWeight: 'normal', locked: false }
            ];

            const [blocks, setBlocks] = useState(initialBlocks);
            const [selectedId, setSelectedId] = useState(null);
            const [paperOrientation, setPaperOrientation] = useState('landscape'); // 預設橫式
            const [paperSize, setPaperSize] = useState('A4');
            const [viewScale, setViewScale] = useState(0.5);
            const [autoScale, setAutoScale] = useState(true);
            const [isToolsOpen, setIsToolsOpen] = useState(true);
            const [activeTab, setActiveTab] = useState('layers');
            const [clipboard, setClipboard] = useState(null);
            const [showPreview, setShowPreview] = useState(false);
            const [guides, setGuides] = useState([]);
            const [contextMenu, setContextMenu] = useState({ visible: false, x: 0, y: 0, blockId: null, isBackground: false });

            const [isDragging, setIsDragging] = useState(false);
            const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
            const [snapToGrid, setSnapToGrid] = useState(true);
            const paperRef = useRef(null);
            const previewContainerRef = useRef(null);
            const fileInputRef = useRef(null);
            const projectInputRef = useRef(null);
            const watermarkInputRef = useRef(null);
            const csvInputRef = useRef(null);
            const touchStartRef = useRef({ x: 0, y: 0, time: 0 });
            const longPressTimer = useRef(null);

            // 批次資料與說明視窗狀態
            const [batchData, setBatchData] = useState([]);
            const [batchSearchTerm, setBatchSearchTerm] = useState('');
            const [batchPreviewIndex, setBatchPreviewIndex] = useState(-1);
            const [isBatchPrint, setIsBatchPrint] = useState(false);
            const [isSingleBatchPrint, setIsSingleBatchPrint] = useState(false);
            const [showBatchHelp, setShowBatchHelp] = useState(false);

            // 雲端匯入選項
            const [showGoogleSheetModal, setShowGoogleSheetModal] = useState(false);
            const [googleSheetUrl, setGoogleSheetUrl] = useState('');
            const [isGoogleSheetLoading, setIsGoogleSheetLoading] = useState(false);

            // 批次資料搜尋過濾
            const filteredBatchData = React.useMemo(() => {
                if (!batchSearchTerm.trim()) return batchData;
                const kw = batchSearchTerm.toLowerCase();
                return batchData.filter(row => Object.values(row).some(val => String(val).toLowerCase().includes(kw)));
            }, [batchData, batchSearchTerm]);

            // 當搜尋結果改變時，若索引超出範圍則歸零
            useEffect(() => {
                if (filteredBatchData.length > 0) {
                    if (batchPreviewIndex >= filteredBatchData.length || batchPreviewIndex < 0) {
                        setBatchPreviewIndex(0);
                    }
                } else {
                    setBatchPreviewIndex(-1);
                }
            }, [filteredBatchData, batchPreviewIndex]);

            // --- 高級版 V3：本機信眾名冊系統 (IndexedDB via localforage) ---
            const [showDbManager, setShowDbManager] = useState(false);
            const [dbData, setDbData] = useState([]);
            const [dbSearch, setDbSearch] = useState('');
            const [dbSelectedIndices, setDbSelectedIndices] = useState(new Set()); // 紀錄勾選的列 index
            const [dbHeadersOrder, setDbHeadersOrder] = useState([]); // 儲存原始匯入的欄位順序

            // 初始化載入本機資料庫與設定
            useEffect(() => {
                const loadDbData = async () => {
                    try {
                        const storedData = await localforage.getItem('temple_member_db');
                        if (storedData) setDbData(storedData);

                        const storedHeaders = await localforage.getItem('temple_member_db_headers');
                        if (storedHeaders) setDbHeadersOrder(storedHeaders);
                    } catch (err) {
                        console.error('無法載入本機資料庫或設定', err);
                    }
                };
                loadDbData();
            }, []);

            // 存入本機資料庫
            const saveDbData = async (newData) => {
                try {
                    await localforage.setItem('temple_member_db', newData);
                    setDbData(newData);
                } catch (err) {
                    console.error('無法儲存名冊至本機', err);
                    alert('儲存名冊失敗，您的儲存空間可能已滿或瀏覽器封鎖了操作。');
                }
            };

            // 動態產生 DB 欄位 (優先使用匯入時記錄的順序，再來補上沒記錄到但存在的資料欄位)
            const dbHeaders = React.useMemo(() => {
                const keys = new Set(dbHeadersOrder);
                dbData.forEach(row => {
                    Object.keys(row).forEach(k => {
                        if (k !== 'id' && k !== '建立時間') keys.add(k);
                    });
                });
                const arr = Array.from(keys);
                if (arr.length === 0) return ['姓名', '聯絡電話', '地址', '備註'];
                return arr;
            }, [dbData, dbHeadersOrder]);

            // DB 操作函式群
            const handleAddDbRow = () => {
                const newRow = { id: Date.now().toString(), 建立時間: new Date().toISOString() };
                dbHeaders.forEach(h => newRow[h] = '');
                saveDbData([newRow, ...dbData]);
            };

            const handleUpdateDbRow = (id, field, value) => {
                const newData = dbData.map(row => row.id === id ? { ...row, [field]: value } : row);
                saveDbData(newData);
            };

            const handleDeleteDbSelected = () => {
                if (dbSelectedIndices.size === 0) return;
                if (!confirm(`確定要刪除勾選的 ${dbSelectedIndices.size} 筆資料嗎？此操作無法復原！`)) return;
                const newData = dbData.filter(row => !dbSelectedIndices.has(row.id));
                saveDbData(newData);
                setDbSelectedIndices(new Set());
            };

            const handleDbToggleSelect = (id) => {

                    window.removeEventListener('mouseup', mu);
                    window.removeEventListener('touchmove', tm);
                    window.removeEventListener('touchend', tu);
                };
            }, [isDragging, selectedId, dragOffset]);

            const updateBlock = (k, v) => setBlocks(p => p.map(b => b.id === selectedId ? { ...b, [k]: v } : b));
            const toggleLock = (id) => setBlocks(p => p.map(b => b.id === id ? { ...b, locked: !b.locked } : b));
            const deleteBlock = () => { if (selectedId && !blocks.find(b => b.id === selectedId)?.locked) { setBlocks(p => p.filter(b => b.id !== selectedId)); setSelectedId(null); } };
            const handleClearCanvas = () => {
                if (blocks.length === 0) return;
                if (confirm('確定要清空畫布上所有的內容嗎？')) {
                    setBlocks([]);
                    setSelectedId(null);
                }
            };
            const addBlock = (type, content = '', x = 50, y = 50) => {
                const newB = { id: `b${Date.now()}`, type, x, y, text: content || '新文字', fontSize: 24, writingMode: paperOrientation === 'landscape' ? 'horizontal-tb' : 'vertical-rl', color: '#000', locked: false, src: content, width: 200, opacity: 1 };

                // V2 大表文專用設定
                if (type === 'grid_list') {
                    newB.width = 300;   // 預設寬度 (px)
                    newB.height = 100;  // 預設高度 (px)
                    newB.gridRows = 1;  // 每一直欄想塞幾個人
                    newB.gridCols = 2; // 總共有幾欄
                    newB.template = "{{姓名}}"; // 預設變數
                    newB.showSeparator = false; // 預設不顯示紅點分隔
                }

                // V2 QR Code 專用設定
                if (type === 'qr_code') {
                    newB.width = 150;
                    newB.url = "https://forms.google.com/";
                }

                setBlocks([...blocks, newB]); setSelectedId(newB.id);
            };
            const handleImage = (e) => {
                const f = e.target.files[0];
                if (f) { const r = new FileReader(); r.onload = (ev) => { addBlock('image', ev.target.result); setIsToolsOpen(true); setActiveTab('settings'); }; r.readAsDataURL(f); }
                e.target.value = '';
            };
            const handlePaperClick = (e) => {
                if (e.target === paperRef.current || e.target.classList.contains('paper-bg')) {
                    setSelectedId(null);
                    setContextMenu({ ...contextMenu, visible: false });
                }
            };
            const handlePaperTouchStart = (e) => {
                const touch = e.touches[0];
                touchStartRef.current = { x: touch.clientX, y: touch.clientY };
                setContextMenu({ ...contextMenu, visible: false });
                longPressTimer.current = setTimeout(() => {
                    setContextMenu({ visible: true, x: touch.clientX, y: touch.clientY, blockId: null, isBackground: true });
                    if (navigator.vibrate) navigator.vibrate(50);
                }, 800);
            };
            const handlePaperDoubleClick = (e) => {
                if (!paperRef.current) return;
                const rect = paperRef.current.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                addBlock('text', '', x - 5, y - 2);
            };
            const handleMenuAction = (action, targetId = null) => {
                const targetBlockId = targetId || contextMenu.blockId;
                const targetBlock = blocks.find(b => b.id === targetBlockId);
                switch (action) {
                    case 'addText': if (paperRef.current) { const rect = paperRef.current.getBoundingClientRect(); addBlock('text', '', ((contextMenu.x - rect.left) / rect.width) * 100, ((contextMenu.y - rect.top) / rect.height) * 100); } break;
                    case 'addImage': fileInputRef.current.click(); break;
                    case 'edit': setSelectedId(targetBlockId); setIsToolsOpen(true); break;
                    case 'copy': if (targetBlock) setClipboard(targetBlock); break;
                    case 'paste': if (clipboard) { const nb = { ...clipboard, id: `b${Date.now()}`, x: clipboard.x + 5, y: clipboard.y + 5, locked: false }; setBlocks([...blocks, nb]); setSelectedId(nb.id) }; break;
                    case 'delete': if (!targetBlock?.locked) { setBlocks(p => p.filter(b => b.id !== targetBlockId)); setSelectedId(null); } else alert('已鎖定'); break;
                    case 'toggleLock': toggleLock(targetBlockId); break;
                    case 'bringToFront': bringToFront(targetBlockId); break;
                    case 'sendToBack': sendToBack(targetBlockId); break;
                    case 'alignCenterH': alignBlockCenter(targetBlockId); break;
                    default: break;
                }
                setContextMenu({ ...contextMenu, visible: false });
            };

            const bringToFront = (id) => setBlocks(prev => { const b = prev.find(x => x.id === id); return b ? [...prev.filter(x => x.id !== id), b] : prev; });
            const sendToBack = (id) => setBlocks(prev => { const b = prev.find(x => x.id === id); return b ? [b, ...prev.filter(x => x.id !== id)] : prev; });
            const alignBlockCenter = (id) => setBlocks(prev => prev.map(b => b.id === id ? { ...b, x: 50 } : b));

            const addStamp = (text) => {
                const is9Chars = text.length > 4;
                const size = is9Chars ? 3 : 2;
                const fontSize = is9Chars ? 22 : 32;
                const chars = text.split('');
                const paddedChars = Array.from({ length: size * size }, (_, i) => chars[i] || ' ');

                let textElements = '';
                const step = 76 / size;
                const start = 12;

                for (let col = 0; col < size; col++) {
                    for (let row = 0; row < size; row++) {
                        const idx = col * size + row;
                        const char = paddedChars[idx];
                        // 道教印章由右至左：第一組字在最右側
                        const x = 100 - (start + (col + 0.5) * step);
                        const y = start + (row + 0.5) * step;
                        textElements += `<text x="${x}" y="${y}" font-family="'KaiTi', 'BiauKai', 'DFKai-SB', '標楷體', serif" font-size="${fontSize}" font-weight="bold" fill="#b91c1c" text-anchor="middle" dominant-baseline="central">${char}</text>`;
                    }
                }

                const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
                    <rect x="5" y="5" width="90" height="90" fill="none" stroke="#b91c1c" stroke-width="6"/>
                    <rect x="12" y="12" width="76" height="76" fill="none" stroke="#b91c1c" stroke-width="2"/>
                    ${textElements}
                </svg>`;

                const image64 = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
                addBlock('image', image64, 40, 40);
            };

            const addWatermark = (e) => {
                const f = e.target.files[0];
                if (f) {
                    const r = new FileReader();
                    r.onload = (ev) => {
                        const newB = { id: `b${Date.now()}`, type: 'image', x: 25, y: 25, src: ev.target.result, width: 400, opacity: 0.15, locked: true };
                        setBlocks(prev => [newB, ...prev]);
                    };
                    r.readAsDataURL(f);
                }
                e.target.value = '';
            };

            const insertLunarDate = () => {
                try {
                    const today = Lunar.fromDate(new Date());
                    const yearStr = today.getYearInGanZhi();
                    const monthStr = today.getMonthInChinese();
                    const dayStr = today.getDayInChinese();
                    const str = `天運歲次 ${yearStr} 年 ${monthStr} 月 ${dayStr} 日`;

                    if (selectedId) {
                        setBlocks(prev => prev.map(b => b.id === selectedId && b.type === 'text' ? { ...b, text: b.text + '\\n' + str } : b));
                    } else {
                        addBlock('text', str, 20, 50);
                    }
                } catch (e) {
                    console.error("Lunar date conversion error", e);
                }
            };

            const exportPDF = () => {
                if (!previewContainerRef.current) return;

                // 建立載入遮罩
                const loadingOverlay = document.createElement('div');
                loadingOverlay.style.position = 'fixed';
                loadingOverlay.style.inset = '0';
                loadingOverlay.style.backgroundColor = 'rgba(0,0,0,0.85)';
                loadingOverlay.style.zIndex = '10000';
                loadingOverlay.style.display = 'flex';
                loadingOverlay.style.flexDirection = 'column';
                loadingOverlay.style.alignItems = 'center';
                loadingOverlay.style.justifyContent = 'center';
                loadingOverlay.style.color = 'white';
                loadingOverlay.innerHTML = `
                    <div style="font-size: 24px; font-weight: bold; margin-bottom: 15px;">💎 進階渲染引擎啟動中...</div>
                    <div style="font-size: 16px; opacity: 0.8;">正在產出高畫質多頁 PDF，請勿在此期間關閉視窗。</div>
                    <div style="margin-top: 20px; font-size: 12px; opacity: 0.5;">（預計耗時 5-10 秒）</div>
                `;
                document.body.appendChild(loadingOverlay);

                // 建立渲染專用的「頂層」容器
                const renderContainer = document.createElement('div');
                renderContainer.style.position = 'fixed'; // 使用 fixed 避免捲動影響
                renderContainer.style.left = '0';
                renderContainer.style.top = '0';
                renderContainer.style.width = `${dimsMM.w}mm`;
                renderContainer.style.height = 'auto'; // 自適應總高度
                renderContainer.style.backgroundColor = '#ffffff';
                renderContainer.style.zIndex = '9999';
                renderContainer.style.visibility = 'visible';
                renderContainer.style.overflow = 'visible';
                renderContainer.className = 'pdf-render-root'; // 加入特定 class 避免被 global CSS 誤殺

                const originalPages = previewContainerRef.current.querySelectorAll('.paper-bg');
                originalPages.forEach((node) => {
                    const clonedPage = node.cloneNode(true);
                    clonedPage.style.transform = 'none';
                    clonedPage.style.boxShadow = 'none';
                    clonedPage.style.margin = '0';
                    clonedPage.style.padding = '0';
                    clonedPage.style.position = 'relative';
                    clonedPage.style.backgroundColor = '#ffffff';
                    clonedPage.style.overflow = 'hidden';
                    clonedPage.style.visibility = 'visible'; // 強制顯示

                    renderContainer.appendChild(clonedPage);
                });

                document.body.appendChild(renderContainer);

                const opt = {
                    margin: 0,
                    filename: `疏文_${new Date().getTime()}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: {
                        scale: 2,
                        useCORS: true,
                        logging: false,
                        scrollY: 0, // 重要：強制從頂部開始擷取
                        scrollX: 0,
                        backgroundColor: '#ffffff',
                    },
                    jsPDF: { unit: 'mm', format: paperSize.toLowerCase(), orientation: paperOrientation },
                    pagebreak: { mode: 'css' }
                };

                // 給予 2 秒讓 DOM 與圖片完成完全渲染
                setTimeout(() => {
                    html2pdf().set(opt).from(renderContainer).save().then(() => {
                        if (renderContainer.parentNode) document.body.removeChild(renderContainer);
                        if (loadingOverlay.parentNode) document.body.removeChild(loadingOverlay);
                    }).catch(err => {
                        console.error("PDF Export Error: ", err);
                        if (renderContainer.parentNode) document.body.removeChild(renderContainer);
                        if (loadingOverlay.parentNode) document.body.removeChild(loadingOverlay);
                        alert("PDF 產出異常，目前最穩定的方式是點擊旁邊的「開啟列印」按鈕，並在印表機選擇「另存為 PDF」。");
                    });
                }, 2000);
            };

            const activeBlock = blocks.find(b => b.id === selectedId);

            const paperStyle = {
                width: `${dimsMM.w}mm`,
                height: `${dimsMM.h}mm`,
                backgroundColor: '#fff9c4',
                transform: `scale(${viewScale})`,
                transformOrigin: 'top center',
                boxShadow: '0 4px 10px rgba(0,0,0,0.1)',
                position: 'relative',
                transition: 'transform 0.2s ease-out',
                flexShrink: 0
            };

            return (
                <div className="h-screen bg-gray-200 flex flex-col md:flex-row overflow-hidden font-sans text-gray-800 select-none touch-none">
                    <input type="file" ref={fileInputRef} accept="image/*" className="hidden" onChange={handleImage} />
                    <input type="file" ref={projectInputRef} accept=".json" className="hidden" onChange={handleLoadProject} />
                    <input type="file" ref={watermarkInputRef} accept="image/*" className="hidden" onChange={addWatermark} />
                    <input type="file" ref={csvInputRef} accept=".csv" className="hidden" onChange={handleLoadCSV} />

                    {/* 列印預覽 Modal */}
                    {showPreview && (
                        <div className="fixed inset-0 z-50 bg-gray-900 bg-opacity-95 flex flex-col items-center justify-center p-4 print-override">
                            <div className="bg-white rounded-lg p-4 w-full max-w-xl flex flex-col max-h-[90vh] print-override">
                                <div className="flex justify-between items-center mb-2 pb-2 border-b print:hidden modal-header">
                                    <h3 className="font-bold">預覽 (將印出以下內容)</h3>
                                    <button onClick={() => setShowPreview(false)}><Icon name="x" /></button>
                                </div>
                                <div ref={previewContainerRef} className="flex-1 overflow-auto bg-gray-300 p-4 flex flex-col items-center gap-8 print-override">
                                    {isBatchPrint && filteredBatchData.length > 0 ? (
                                        (isSingleBatchPrint ? [filteredBatchData[batchPreviewIndex]] : filteredBatchData).map((row, idx) => {
                                            const pageBlocks = blocks.map(b => {
                                                if (b.type === 'text') {
                                                    let newText = b.text;
                                                    Object.keys(row).forEach(key => { newText = newText.replace(new RegExp(`\\{\\{${key}\\}\\}`, 'g'), row[key] || ''); });
                                                    return { ...b, text: newText };
                                                } return b;
                                            });
                                            return (
                                                <div key={idx} className="bg-white shadow-xl relative origin-top print-page paper-bg"
                                                    style={{
                                                        width: `${dimsMM.w}mm`,
                                                        height: `${dimsMM.h}mm`,
                                                        transform: `scale(${previewScale})`,
                                                        transformOrigin: 'top center',
                                                        flexShrink: 0
                                                    }}>
                                                    <PaperContent blocks={pageBlocks} showPreview={true} batchData={isSingleBatchPrint ? [filteredBatchData[batchPreviewIndex]] : filteredBatchData} />
                                                </div>
                                            )
                                        })
                                    ) : (
                                        <div className="bg-white shadow-xl relative origin-top print-page single-print-page paper-bg"
                                            style={{
                                                width: `${dimsMM.w}mm`,
                                                height: `${dimsMM.h}mm`,
                                                transform: `scale(${previewScale})`,
                                                transformOrigin: 'top center',
                                                flexShrink: 0
                                            }}>
                                            <PaperContent
                                                blocks={currentBlocksDisplay}
                                                selectedId={null}
                                                showPreview={true}
                                                batchData={batchData}
                                                onMouseDown={null}
                                                onTouchStart={null}
                                                onContextMenu={null}
                                            />
                                        </div>
                                    )}
                                </div>
                                <div className="mt-4 flex gap-2 print:hidden flex-wrap modal-footer">
                                    <button onClick={() => setShowPreview(false)} className="flex-1 min-w-[100px] py-3 border rounded font-bold">返回編輯</button>
                                    <button onClick={exportPDF} className="flex-1 min-w-[120px] py-3 bg-gray-100 text-gray-700 border rounded font-bold flex justify-center items-center gap-2">
                                        <Icon name="save" /> 匯出 PDF
                                    </button>
                                    <button onClick={() => { window.print() }} className="flex-[1.5] min-w-[140px] py-3 bg-blue-600 text-white rounded font-bold flex justify-center items-center gap-2 shadow-lg scale-105 transition-transform hover:scale-110">
                                        <Icon name="printer" color="white" /> 開啟列印
                                    </button>
                                    <button onClick={() => { setShowPreview(false); setShowTeleprompter(true); }} className="w-full py-3 bg-purple-900 text-yellow-400 border border-yellow-600 rounded font-bold flex justify-center items-center gap-2 shadow-[0_0_10px_rgba(234,179,8,0.3)] mt-2">
                                        <Icon name="eye" color="#facc15" /> 啟動：法師專用讀稿機 (大字報)
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* V2：法師讀稿機 (Teleprompter) Modal */}
                    {showTeleprompter && (
                        <div className={`fixed inset-0 z-[100] flex flex-col transition-colors duration-500 ${teleprompterTheme === 'dark' ? 'bg-black text-yellow-400' : 'bg-white text-black'}`}>
                            {/* 讀稿機控制列 */}
                            <div className={`flex justify-between items-center p-4 border-b ${teleprompterTheme === 'dark' ? 'border-gray-800 bg-gray-900' : 'border-gray-200 bg-gray-50'}`}>
                                <div className="flex items-center gap-4">
                                    <h3 className="font-bold text-xl drop-shadow-md">📜 祈福大字報</h3>
                                    <div className="flex items-center gap-2 border rounded overflow-hidden">
                                        <button onClick={() => setTeleprompterSize(s => Math.max(24, s - 8))} className="px-3 py-1 hover:bg-gray-500 hover:text-white transition">A-</button>
                                        <span className="px-2 text-sm">{teleprompterSize}px</span>
                                        <button onClick={() => setTeleprompterSize(s => Math.min(200, s + 8))} className="px-3 py-1 hover:bg-gray-500 hover:text-white transition">A+</button>
                                    </div>
                                    <div className="flex items-center gap-2 border rounded overflow-hidden">
                                        <button onClick={() => setTeleprompterTheme('dark')} className={`px-3 py-1 transition ${teleprompterTheme === 'dark' ? 'bg-gray-700 text-white' : 'hover:bg-gray-200'}`}>黑底金字</button>
                                        <button onClick={() => setTeleprompterTheme('light')} className={`px-3 py-1 transition ${teleprompterTheme === 'light' ? 'bg-gray-300 text-black' : 'hover:bg-gray-800'}`}>白底黑字</button>
                                    </div>
                                </div>
                                <button onClick={() => setShowTeleprompter(false)} className="p-2 border rounded hover:bg-red-600 hover:text-white transition"><Icon name="x" size={24} /></button>
                            </div>

                            {/* 讀稿機內容區 (由右至左捲動) */}
                            <div className="flex-1 overflow-x-auto overflow-y-hidden p-8 flex justify-end" style={{ writingMode: 'vertical-rl' }}>
                                <div className="flex flex-col flex-wrap h-full gap-8 pr-[50vw]">
                                    {/* 提取所有純文字並依照 x 座標 (由右至左) 排序 */}
                                    {blocks
                                        .filter(b => b.type === 'text')
                                        .sort((a, b) => b.x - a.x)
                                        .map((b, i) => (
                                            <div key={i} className="" style={{ fontSize: `${teleprompterSize}px`, lineHeight: '1.8', fontFamily: '"KaiTi", "BiauKai", "DFKai-SB", "楷體", serif' }}>
                                                {b.text.split('\n').map((line, li) => (
                                                    <div key={li} className="mb-4">{line}</div>
                                                ))}
                                            </div>
                                        ))
                                    }
                                    {blocks.filter(b => b.type === 'text').length === 0 && (
                                        <div className="text-center opacity-50" style={{ fontSize: `${teleprompterSize}px` }}>畫布上沒有可朗讀的文字內容</div>
                                    )}
                                </div>
                            </div>
                            <div className={`p-2 text-center text-xs opacity-50 border-t ${teleprompterTheme === 'dark' ? 'border-gray-800' : 'border-gray-200'}`}>
                                提示：可用手指或滑鼠向左滑動平閱讀稿內容。
                            </div>
                        </div>
                    )}

                    {/* 批次處理說明 Modal */}
                    {showBatchHelp && (
                        <div className="fixed inset-0 z-50 bg-gray-900 bg-opacity-70 flex items-center justify-center p-4">
                            <div className="bg-white rounded-lg p-6 w-full max-w-md shadow-2xl">
                                <h3 className="font-bold text-lg mb-4 text-green-800 border-b pb-2">📂 批次自動套印說明</h3>
                                <div className="space-y-4 text-sm text-gray-700">
                                    <p>這項功能可以讓您從 Excel (CSV) 匯入名單，自動產生數百份不同的疏文。</p>
                                    <div>
                                        <div className="font-bold mb-1">第一步：準備 Excel 檔案</div>
                                        <p className="text-gray-500">將您的信眾名單加上標題列（例如第一列寫上：「姓名」、「地址」），然後另存新檔為 <b>CSV (逗號分隔)</b> 格式。</p>
                                    </div>
                                    <div>
                                        <div className="font-bold mb-1">第二步：在排版中加入變數</div>
                                        <p className="text-gray-500">在疏文的文字區塊中，輸入帶有雙大括號的變數，例如：<br /><code className="bg-gray-100 text-red-600 px-1 rounded">{`信士 {{姓名}} 居住於 {{地址}}`}</code></p>
                                    </div>
                                    <div>
                                        <div className="font-bold mb-1">第三步：匯入並預覽列印</div>
                                        <p className="text-gray-500">點擊載入 CSV 後，工具箱會顯示匯入了幾筆資料。這時主畫面會自動將變數替換成第一筆資料供您預覽位置是否正確。點擊「列印」系統就會一次產出所有人的疏文。</p>
                                    </div>
                                </div>
                                <button onClick={() => setShowBatchHelp(false)} className="w-full mt-6 py-2 bg-gray-800 text-white font-bold rounded">我瞭解了</button>
                            </div>
                        </div>
                    )}

                    {/* 右鍵選單 */}
                    {contextMenu.visible && (
                        <div className="fixed z-50 bg-white rounded shadow-xl border py-1 min-w-[140px]" style={{ left: Math.min(contextMenu.x, window.innerWidth - 150), top: Math.min(contextMenu.y, window.innerHeight - 200) }}>
                            {contextMenu.isBackground ? (
                                <>
                                    <button onClick={() => handleMenuAction('addText')} className="w-full text-left px-4 py-3 hover:bg-blue-50 flex gap-2 text-sm"><Icon name="plus" /> 新增文字</button>
                                    <button onClick={() => handleMenuAction('addImage')} className="w-full text-left px-4 py-3 hover:bg-blue-50 flex gap-2 text-sm"><Icon name="image" /> 新增圖片</button>
                                    <button onClick={() => handleMenuAction('paste')} className="w-full text-left px-4 py-3 hover:bg-blue-50 flex gap-2 text-sm" disabled={!clipboard}><Icon name="paste" /> 貼上</button>
                                </>
                            ) : (
                                <>
                                    <button onClick={() => handleMenuAction('edit')} className="w-full text-left px-4 py-2 hover:bg-blue-50 flex gap-2 text-sm"><Icon name="edit" /> 編輯</button>
                                    <button onClick={() => handleMenuAction('toggleLock')} className="w-full text-left px-4 py-2 hover:bg-blue-50 flex gap-2 text-sm"><Icon name="lock" /> 鎖定/解鎖</button>
                                    <div className="border-t my-1"></div>
                                    <button onClick={() => handleMenuAction('bringToFront')} className="w-full text-left px-4 py-2 hover:bg-blue-50 flex gap-2 text-sm"><Icon name="layerUp" /> 移至最上層</button>
                                    <button onClick={() => handleMenuAction('sendToBack')} className="w-full text-left px-4 py-2 hover:bg-blue-50 flex gap-2 text-sm"><Icon name="layerDown" /> 移至最底層</button>
                                    <button onClick={() => handleMenuAction('alignCenterH')} className="w-full text-left px-4 py-2 hover:bg-blue-50 flex gap-2 text-sm"><Icon name="alignCenter" /> 水平置中 (畫面)</button>
                                    <div className="border-t my-1"></div>
                                    <button onClick={() => handleMenuAction('copy')} className="w-full text-left px-4 py-2 hover:bg-blue-50 flex gap-2 text-sm"><Icon name="copy" /> 複製</button>
                                    <button onClick={() => handleMenuAction('delete')} className="w-full text-left px-4 py-2 hover:bg-red-50 text-red-500 flex gap-2 text-sm"><Icon name="trash" /> 刪除</button>
                                </>
                            )}
                        </div>
                    )}
                    {contextMenu.visible && <div className="fixed inset-0 z-40" onClick={() => setContextMenu({ ...contextMenu, visible: false })} onTouchStart={() => setContextMenu({ ...contextMenu, visible: false })} />}

                    {/* V4：App Store 風格範本市集 Modal */}
                    {showTemplateMarket && (
                        <div className="fixed inset-0 z-[100] bg-black bg-opacity-60 backdrop-blur-sm flex items-center justify-center p-0 md:p-10 animate-in fade-in duration-300">
                            <div className="bg-[#f2f2f7] md:rounded-2xl shadow-2xl w-full h-full max-w-6xl flex flex-col md:flex-row overflow-hidden relative">

                                {/* 左側 Sidebar */}
                                <div className="w-full md:w-64 bg-[#f2f2f7] border-b md:border-b-0 md:border-r border-gray-200 flex flex-col p-4">
                                    <div className="hidden md:flex flex-col mb-8">
                                        <h2 className="text-2xl font-bold tracking-tight px-3 py-4">範本市集</h2>
                                        <div className="relative px-3">
                                            <input type="text" placeholder="搜尋範本" className="w-full bg-gray-200 border-none rounded-lg px-3 py-1.5 text-sm focus:ring-0" />
                                        </div>
                                    </div>
                                    <nav className="flex md:flex-col gap-1 overflow-x-auto md:overflow-visible pb-2 md:pb-0 scrollbar-hide">
                                        {['ALL', '祈福', '拔薦', '節慶'].map(cat => (
                                            <button
                                                key={cat}
                                                onClick={() => { setActiveStoreCategory(cat); setStoreDetailItem(null); }}
                                                className={`flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition-all whitespace-nowrap
                                                    ${activeStoreCategory === cat ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500 hover:bg-gray-200'}
                                                `}
                                            >
                                                <div className={`w-8 h-8 rounded-lg flex items-center justify-center text-lg
                                                    ${activeStoreCategory === cat ? 'bg-blue-600 text-white' : 'bg-gray-300 text-gray-600'}
                                                `}>
                                                    {cat === 'ALL' ? '' : cat === '祈福' ? '🧧' : cat === '拔薦' ? '☸️' : '🏮'}
                                                </div>
                                                {cat === 'ALL' ? '全部類別' : cat}
                                            </button>
                                        ))}
                                    </nav>
                                    <button onClick={() => setShowTemplateMarket(false)} className="md:mt-auto p-4 flex items-center gap-2 text-red-500 font-semibold hover:bg-red-50 rounded-xl transition">
                                        <Icon name="x" size={20} /> 關閉市集
                                    </button>
                                </div>

                                {/* 右側內容區 */}
                                <div className="flex-1 bg-white overflow-y-auto p-6 md:p-10 scrollbar-hide text-gray-800">
                                    {storeDetailItem ? (
                                        /* 詳情頁面 */
                                        <div className="animate-in slide-in-from-right duration-500 h-full flex flex-col">
                                            <div className="flex items-start gap-6 mb-8">
                                                <div className={`w-32 h-32 md:w-40 md:h-40 rounded-3xl ${storeDetailItem.coverColor} flex items-center justify-center text-7xl shadow-lg text-white`}>
                                                    {storeDetailItem.coverIcon}
                                                </div>
                                                <div className="flex-1">
                                                    <h3 className="text-3xl font-extrabold mb-1">{storeDetailItem.name}</h3>
                                                    <p className="text-blue-600 font-semibold text-lg mb-4">{storeDetailItem.category}</p>
                                                    <div className="flex items-center gap-4">
                                                        <button
                                                            onClick={() => {
                                                                // V4: 直接套用，避免某些瀏覽器或環境下 confirm 造成阻塞或無法跳出的問題
                                                                const clonedBlocks = JSON.parse(JSON.stringify(storeDetailItem.blocks));
                                                                setBlocks(clonedBlocks);
                                                                setHistory([clonedBlocks]);
                                                                setHistoryIndex(0);
                                                                setSelectedId(null);
                                                                setShowTemplateMarket(false);
                                                                alert('範本套用成功！');
                                                            }}
                                                            className="bg-blue-600 text-white px-10 py-2.5 rounded-full font-bold text-lg hover:bg-blue-700 hover:scale-105 active:scale-95 transition-all shadow-md"
                                                        >
                                                            獲取
                                                        </button>
                                                        <button onClick={() => setStoreDetailItem(null)} className="p-3 bg-gray-100 rounded-full hover:bg-gray-200 transition"><Icon name="arrowRight" className="rotate-180" /></button>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-3 gap-4 mb-8 text-center border-y py-4 border-gray-100">
                                                <div>
                                                    <p className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">評分</p>
                                                    <div className="text-xl font-bold text-gray-700 flex items-center justify-center gap-1">{storeDetailItem.rating} <span className="text-sm">★</span></div>
                                                </div>
                                                <div className="border-x border-gray-100">
                                                    <p className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">開發者</p>
                                                    <div className="text-sm font-bold text-gray-700 truncate px-2">{storeDetailItem.author}</div>
                                                </div>
                                                <div>
                                                    <p className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">下載量</p>
                                                    <div className="text-xl font-bold text-gray-700">{storeDetailItem.downloads}</div>
                                                </div>
                                            </div>

                                            <div className="prose max-w-none">
                                                <h4 className="text-xl font-bold mb-4">簡介</h4>
                                                <p className="text-gray-600 leading-relaxed text-lg">{storeDetailItem.desc}</p>
                                            </div>

                                            <div className="mt-10">
                                                <h4 className="text-xl font-bold mb-4 text-gray-800">預覽 (內容格式)</h4>
                                                <div className="bg-gray-50 rounded-3xl p-8 flex justify-center items-center h-80 overflow-hidden relative shadow-inner border border-gray-100">
                                                    <div className="scale-[0.4] origin-center -translate-y-4">
                                                        <div className="flex gap-8">
                                                            {storeDetailItem.blocks.map((b, i) => (
                                                                b.type === 'text' && (
                                                                    <div key={i} style={{ writingMode: 'vertical-rl', fontSize: '28px', whiteSpace: 'pre-wrap', fontFamily: '"KaiTi", serif' }} className="border-2 border-red-800 p-4 bg-yellow-50 shadow-md text-red-900">{b.text}</div>
                                                                )
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        /* 列表頁面 */
                                        <div className="animate-in fade-in slide-in-from-bottom duration-500">
                                            <div className="flex justify-between items-end mb-8">
                                                <div>
                                                    <p className="text-gray-500 font-bold uppercase tracking-widest text-xs mb-1">精選範本</p>
                                                    <h3 className="text-4xl font-extrabold">{activeStoreCategory === 'ALL' ? '全部範本' : activeStoreCategory}</h3>
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                                {filteredStoreTemplates.map(tpl => (
                                                    <div
                                                        key={tpl.id}
                                                        onClick={() => setStoreDetailItem(tpl)}
                                                        className="group bg-white rounded-[2rem] p-5 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-300 cursor-pointer border border-gray-50 flex flex-col"
                                                    >
                                                        <div className={`w-full aspect-square rounded-[1.5rem] ${tpl.coverColor} mb-5 flex items-center justify-center text-7xl group-hover:scale-105 transition-transform duration-500 shadow-inner text-white`}>
                                                            {tpl.coverIcon}
                                                        </div>
                                                        <div className="flex items-center gap-3">
                                                            <div className="flex-1 min-w-0">
                                                                <h4 className="font-bold text-lg truncate text-gray-800">{tpl.name}</h4>
                                                                <p className="text-sm text-gray-400 truncate">{tpl.author}</p>
                                                            </div>
                                                            <button
                                                                onClick={(e) => {
                                                                    e.stopPropagation();
                                                                    setStoreDetailItem(tpl);
                                                                }}
                                                                className="bg-gray-100 text-blue-600 px-4 py-1.5 rounded-full font-extrabold text-sm hover:bg-blue-600 hover:text-white transition-colors"
                                                            >
                                                                查看
                                                            </button>
                                                        </div>
                                                        <div className="mt-3 pt-3 border-t border-gray-50 flex items-center justify-between text-[11px] font-bold text-gray-400">
                                                            <div className="flex items-center gap-1">
                                                                <span className="text-yellow-400 text-xs">★</span> {tpl.rating}
                                                            </div>
                                                            <div>{tpl.category}</div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {/* 手機版關閉鈕 */}
                                <button
                                    onClick={() => setShowTemplateMarket(false)}
                                    className="md:hidden absolute top-4 right-4 w-10 h-10 bg-white rounded-full shadow-lg flex items-center justify-center text-gray-500 z-[110]"
                                >
                                    <Icon name="x" size={24} />
                                </button>
                            </div>
                        </div>
                    )}

                    {/* V3：本機信眾名冊 Modal (IndexedDB) */}
                    {showDbManager && (
                        <div className="fixed inset-0 z-[100] bg-gray-900 bg-opacity-90 flex items-center justify-center p-2 md:p-6">
                            <div className="bg-white rounded-xl shadow-2xl w-full h-full md:max-w-6xl flex flex-col overflow-hidden border-2 border-green-600">
                                {/* 標頭與工具列 */}
                                <div className="p-4 bg-green-50 border-b flex flex-col md:flex-row gap-4 justify-between md:items-center">
                                    <div className="flex items-center justify-between md:justify-start gap-4">
                                        <h3 className="font-bold text-xl text-green-800 flex items-center gap-2"><Icon name="grid" size={24} /> 📖 本機信眾名冊</h3>
                                        <button onClick={() => setShowDbManager(false)} className="md:hidden p-2 bg-gray-200 rounded"><Icon name="x" size={20} /></button>
                                    </div>
                                    <div className="flex-1 max-w-md w-full relative">
                                        <input
                                            type="text"
                                            placeholder="搜尋姓名、電話、地址..."
                                            value={dbSearch}
                                            onChange={e => setDbSearch(e.target.value)}
                                            className="w-full pl-3 pr-4 py-2 border rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
                                        />
                                    </div>
                                    <button onClick={() => setShowDbManager(false)} className="hidden md:block p-2 text-gray-500 hover:bg-red-50 hover:text-red-500 rounded transition"><Icon name="x" size={24} /></button>
                                </div>

                                {/* 控制按鈕區 */}
                                <div className="p-3 bg-gray-100 border-b flex flex-wrap gap-2 items-center text-sm">
                                    <button onClick={handleAddDbRow} className="px-3 py-1.5 bg-green-600 text-white rounded shadow hover:bg-green-700 font-bold">➕ 新增</button>
                                    <div className="w-px h-6 bg-gray-300 mx-1"></div>
                                    <button onClick={handleSyncCsvToDb} className="px-3 py-1.5 bg-blue-600 text-white rounded shadow hover:bg-blue-700 font-bold" title="把目前右下角載入的 CSV 名單存進來">📥 匯入目前預覽</button>
                                    <button onClick={handleExportDbToCsv} className="px-3 py-1.5 bg-indigo-600 text-white rounded shadow hover:bg-indigo-700 font-bold" title="匯出目前修改好的名冊">⬇️ 匯出 CSV</button>
                                    <div className="w-px h-6 bg-gray-300 mx-1"></div>
                                    <span className="text-gray-500">已選 {dbSelectedIndices.size} 筆</span>
                                    <button
                                        onClick={handleLoadDbSelectionToPrint}
                                        disabled={dbSelectedIndices.size === 0}
                                        className={`px-3 py-1.5 rounded shadow font-bold transition-colors ${dbSelectedIndices.size > 0 ? 'bg-orange-500 hover:bg-orange-600 text-white' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}
                                    >
                                        🖨️ 勾選套印！
                                    </button>
                                    <button
                                        onClick={handleDeleteDbSelected}
                                        disabled={dbSelectedIndices.size === 0}
                                        className={`ml-auto px-3 py-1.5 rounded shadow font-bold transition-colors ${dbSelectedIndices.size > 0 ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}
                                    >
                                        🗑️ 刪除勾選
                                    </button>
                                </div>

                                {/* 名冊表格 */}
                                <div className="flex-1 overflow-auto bg-gray-50">
                                    <table className="w-full text-left border-collapse text-sm min-w-max">
                                        <thead className="bg-gray-200 sticky top-0 shadow-sm z-10">
                                            <tr>
                                                <th className="p-2 border-b border-r w-12 text-center">
                                                    <input
                                                        type="checkbox"
                                                        checked={filteredDbData.length > 0 && dbSelectedIndices.size === filteredDbData.length}
                                                        onChange={() => handleDbSelectAll(filteredDbData)}
                                                        className="w-4 h-4 cursor-pointer"
                                                    />
                                                </th>
                                                <th className="p-2 border-b border-r font-bold text-gray-700 w-16 text-center">No.</th>
                                                {dbHeaders.map((h, i) => (
                                                    <th key={h} className={`p-2 border-b font-bold text-gray-700 whitespace-nowrap min-w-[100px] ${i !== dbHeaders.length - 1 ? 'border-r' : ''}`}>
                                                        {h}
                                                    </th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {filteredDbData.length === 0 ? (
                                                <tr><td colSpan="6" className="p-10 text-center text-gray-500">
                                                    沒有符合條件的名單。您可以點擊上方「新增」或「匯入目前 CSV」。
                                                </td></tr>
                                            ) : (
                                                filteredDbData.map((row, index) => (
                                                    <tr key={row.id} className={`hover:bg-blue-50 transition-colors ${dbSelectedIndices.has(row.id) ? 'bg-orange-50' : 'bg-white'}`}>
                                                        <td className="p-2 border-b border-r text-center">
                                                            <input
                                                                type="checkbox"
                                                                checked={dbSelectedIndices.has(row.id)}
                                                                onChange={() => handleDbToggleSelect(row.id)}
                                                                className="w-4 h-4 cursor-pointer"
                                                            />
                                                        </td>
                                                        <td className="p-2 border-b border-r text-center text-gray-400 font-mono text-xs">{index + 1}</td>
                                                        {dbHeaders.map((h, i) => (
                                                            <td key={h} className={`p-0 border-b min-w-[100px] ${i !== dbHeaders.length - 1 ? 'border-r' : ''}`}>
                                                                <input
                                                                    type="text"
                                                                    value={row[h] || ''}
                                                                    onChange={e => handleUpdateDbRow(row.id, h, e.target.value)}
                                                                    className="w-full h-full p-2 bg-transparent focus:bg-white focus:outline-none focus:ring-1 focus:ring-green-400"
                                                                    placeholder={h.includes('電話') ? '09...' : ''}
                                                                />
                                                            </td>
                                                        ))}
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                </div>

                                <div className="p-2 bg-gray-100 border-t text-xs text-center text-gray-500 flex justify-between px-4">
                                    <span>本地資料庫總筆數：{dbData.length} 筆</span>
                                    <span>＊名單資料安全保存在您的個人電腦瀏覽器中，完全離線運作不洩漏隱私。</span>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 左側面板 */}
                    <div className={`bg-white shadow-lg z-20 flex flex-col print:hidden transition-all duration-300 absolute md:relative bottom-0 w-full md:w-80 md:h-full ${isToolsOpen ? 'h-[50vh]' : 'h-12'}`}>
                        <div className="p-3 border-b flex justify-between items-center bg-gray-50 cursor-pointer" onClick={() => setIsToolsOpen(!isToolsOpen)}>
                            <div className="flex items-center gap-2 font-bold"><Icon name="settings" /> 工具箱</div>
                            <div className="flex items-center gap-3">
                                {/* 折疊時也想按 Undo，就把這區塊放這，或是只放展開的箭頭 */}
                                <Icon name={isToolsOpen ? "chevronDown" : "chevronUp"} />
                            </div>
                        </div>

                        {/* 高級版：把工具列移至面板上方，絕不影響任何畫布或標題 */}
                        {isToolsOpen && (
                            <div className="flex gap-2 bg-white px-4 py-2 border-b justify-center items-center shadow-sm z-10">
                                <button onClick={undo} disabled={historyIndex === 0} className={`p-2 rounded ${historyIndex === 0 ? 'text-gray-300 cursor-not-allowed' : 'hover:bg-gray-100'}`} title="上一步 (Undo)"><Icon name="undo" /></button>
                                <button onClick={redo} disabled={historyIndex === history.length - 1} className={`p-2 rounded ${historyIndex === history.length - 1 ? 'text-gray-300 cursor-not-allowed' : 'hover:bg-gray-100'}`} title="下一步 (Redo)"><Icon name="redo" /></button>
                                <div className="w-px h-5 bg-gray-300 mx-1"></div>
                                <button onClick={handleClearCanvas} className="p-2 rounded hover:bg-red-50 text-red-500" title="全部清空 (全部空白)"><Icon name="trash" /></button>
                                <div className="w-px h-5 bg-gray-300 mx-1"></div>
                                <button onClick={handleSaveProject} className="p-2 rounded hover:bg-gray-100" title="儲存專案範本 (.json)"><Icon name="save" /></button>
                                <button onClick={() => projectInputRef.current.click()} className="p-2 rounded hover:bg-gray-100" title="載入專案範本 (.json)"><Icon name="folder" /></button>
                            </div>
                        )}
                        {isToolsOpen && (
                            <div className="bg-orange-50 p-2 text-center border-b flex flex-col gap-1">
                                <button onClick={() => setShowTemplateMarket(true)} className="text-orange-800 font-bold text-sm w-full py-1.5 hover:bg-orange-100 rounded transition flex items-center justify-center gap-2">
                                    <Icon name="grid" size={16} /> 開啟 V2 疏文範本市集
                                </button>
                                <button onClick={() => setShowDbManager(true)} className="text-green-800 font-bold text-sm w-full py-1.5 hover:bg-green-100 rounded transition flex items-center justify-center gap-2 border border-green-200 shadow-sm bg-white">
                                    📖 開啟 V3 本機信眾名冊
                                </button>
                            </div>
                        )}

                        {isToolsOpen && activeBlock ? (
                            <div className="flex-1 overflow-y-auto p-4 space-y-4">
