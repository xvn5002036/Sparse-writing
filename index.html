                                <div className="flex justify-between items-center pb-2 border-b">
                                    <span className="text-blue-600 font-bold flex gap-2 items-center"><Icon name="edit" /> {activeBlock.locked ? '鎖定中' : '編輯中'}</span>
                                    <div className="flex gap-2">
                                        <button onClick={() => toggleLock(activeBlock.id)} className={`p-2 rounded ${activeBlock.locked ? 'bg-red-100' : 'bg-gray-100'}`}><Icon name={activeBlock.locked ? "lock" : "unlock"} /></button>
                                        <button onClick={deleteBlock} className="p-2 rounded text-red-500 bg-gray-100" disabled={activeBlock.locked}><Icon name="trash" /></button>
                                    </div>
                                </div>
                                {activeBlock.type === 'text' ? (
                                    <>
                                        <button onClick={insertLunarDate} className="w-full text-xs bg-indigo-50 text-indigo-700 py-2 rounded border border-indigo-200 mb-2">📅 插入今日農曆日期 (文言文格式)</button>
                                        <div className="space-y-1">
                                            <textarea value={activeBlock.text} onChange={e => updateBlock('text', e.target.value)} rows="3" className="w-full border p-2 rounded" disabled={activeBlock.locked} />
                                            <VariableButtonList onInsert={(v) => handleVariableClick(v, activeBlock, updateBlock, addBlock)} batchData={batchData} />
                                        </div>
                                        <div className="flex gap-2"><button onClick={() => updateBlock('writingMode', 'horizontal-tb')} className="flex-1 border py-2 rounded text-xs flex justify-center gap-1"><Icon name="arrowRight" /> 橫排</button><button onClick={() => updateBlock('writingMode', 'vertical-rl')} className="flex-1 border py-2 rounded text-xs flex justify-center gap-1"><Icon name="arrowDown" /> 直排</button></div>
                                        <div className="flex items-center gap-2"><span className="text-xs">字體</span><input type="range" min="12" max="150" value={activeBlock.fontSize} onChange={e => updateBlock('fontSize', parseInt(e.target.value))} className="flex-1" /></div>
                                        <label className="flex items-center gap-2"><input type="checkbox" checked={activeBlock.fontWeight === 'bold'} onChange={e => updateBlock('fontWeight', e.target.checked ? 'bold' : 'normal')} /> 粗體</label>
                                    </>
                                ) : activeBlock.type === 'image' ? (
                                    <div className="space-y-3">
                                        <div className="h-20 bg-gray-100 flex justify-center"><img src={activeBlock.src} className="h-full object-contain" /></div>
                                        <div className="flex items-center gap-2"><span className="text-xs">大小</span><input type="range" min="20" max="800" value={activeBlock.width} onChange={e => updateBlock('width', parseInt(e.target.value))} className="flex-1" /></div>
                                        <div className="flex items-center gap-2"><span className="text-xs">透明</span><input type="range" min="0.1" max="1" step="0.1" value={activeBlock.opacity} onChange={e => updateBlock('opacity', parseFloat(e.target.value))} className="flex-1" /></div>
                                    </div>
                                ) : activeBlock.type === 'grid_list' ? (
                                    <div className="space-y-3 text-sm">
                                        <div className="p-2 bg-yellow-50 text-yellow-800 text-xs rounded border border-yellow-200">💎 大表文網格：批次列印時會自動依序塞入名單。</div>
                                        <div className="flex items-center gap-2"><span className="text-xs w-16">直行數量</span><input type="number" min="1" max="50" value={activeBlock.gridCols} onChange={e => updateBlock('gridCols', parseInt(e.target.value) || 1)} className="flex-1 border p-1 rounded" /></div>
                                        <div className="flex items-center gap-2"><span className="text-xs w-16">橫列數量</span><input type="number" min="1" max="50" value={activeBlock.gridRows} onChange={e => updateBlock('gridRows', parseInt(e.target.value) || 1)} className="flex-1 border p-1 rounded" /></div>
                                        <div className="flex items-center gap-2"><span className="text-xs w-16">區塊寬度</span><input type="range" min="50" max="2000" value={activeBlock.width} onChange={e => updateBlock('width', parseInt(e.target.value))} className="flex-1" /></div>
                                        <div className="flex items-center gap-2"><span className="text-xs w-16">區塊高度</span><input type="range" min="50" max="2000" value={activeBlock.height} onChange={e => updateBlock('height', parseInt(e.target.value))} className="flex-1" /></div>
                                        <div className="flex items-center gap-2"><span className="text-xs w-16">文字大小</span><input type="range" min="8" max="100" value={activeBlock.fontSize} onChange={e => updateBlock('fontSize', parseInt(e.target.value))} className="flex-1" /></div>

                                        <div className="mt-2">
                                            <span className="text-xs font-bold mb-1 block">網格變數樣板</span>
                                            <input type="text" value={activeBlock.template} onChange={e => updateBlock('template', e.target.value)} className="w-full border p-2 rounded text-xs" placeholder="例如：{{姓名}}" />
                                            <div className="mt-1">
                                                <VariableButtonList onInsert={(v) => handleVariableClick(v, activeBlock, updateBlock, addBlock)} batchData={batchData} />
                                            </div>
                                        </div>
                                        <label className="flex items-center gap-2 text-xs"><input type="checkbox" checked={activeBlock.showSeparator} onChange={e => updateBlock('showSeparator', e.target.checked)} /> 顯示紅色分隔點</label>
                                        <div className="flex gap-2"><button onClick={() => updateBlock('writingMode', 'horizontal-tb')} className="flex-1 border py-2 rounded text-xs flex justify-center gap-1"><Icon name="arrowRight" /> 橫排</button><button onClick={() => updateBlock('writingMode', 'vertical-rl')} className="flex-1 border py-2 rounded text-xs flex justify-center gap-1"><Icon name="arrowDown" /> 直排</button></div>
                                    </div>
                                ) : activeBlock.type === 'qr_code' ? (
                                    <div className="space-y-3 text-sm">
                                        <div className="p-2 bg-blue-50 text-blue-800 text-xs rounded border border-blue-200">📱 自助填單 QR Code：輸入您的 Google 表單網址，用手機掃描會自動開啟。</div>
                                        <div className="mt-2">
                                            <span className="text-xs font-bold mb-1 block">表單或活動網址</span>
                                            <input type="text" value={activeBlock.url} onChange={e => updateBlock('url', e.target.value)} className="w-full border p-2 rounded text-xs" placeholder="https://forms.google.com/..." />
                                        </div>
                                        <div className="flex items-center gap-2"><span className="text-xs">大小</span><input type="range" min="50" max="800" value={activeBlock.width} onChange={e => updateBlock('width', parseInt(e.target.value))} className="flex-1" /></div>
                                        <div className="flex items-center gap-2"><span className="text-xs">透明</span><input type="range" min="0.1" max="1" step="0.1" value={activeBlock.opacity} onChange={e => updateBlock('opacity', parseFloat(e.target.value))} className="flex-1" /></div>
                                    </div>
                                ) : null}
                                <button onClick={() => setSelectedId(null)} className="w-full py-2 bg-green-600 text-white rounded font-bold">完成</button>
                            </div>
                        ) : isToolsOpen && (
                            <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                <div className="flex bg-gray-100 rounded p-1 mb-2 items-center justify-between">
                                    <label className="text-xs font-bold flex items-center gap-1 cursor-pointer">
                                        <input type="checkbox" checked={showFoldGuides} onChange={e => setShowFoldGuides(e.target.checked)} /> 顯示摺紙輔助線
                                    </label>
                                    {showFoldGuides && (
                                        <select value={foldCount} onChange={e => setFoldCount(Number(e.target.value))} className="text-xs border p-1 rounded bg-white">
                                            <option value={5}>5 摺</option>
                                            <option value={7}>7 摺</option>
                                            <option value={9}>9 摺</option>
                                            <option value={11}>11 摺</option>
                                            <option value={12}>12 摺</option>
                                        </select>
                                    )}
                                </div>
                                <div className="flex bg-gray-100 rounded p-1 mb-2"><button onClick={() => setPaperSize('A4')} className={`flex-1 text-xs py-1 rounded ${paperSize === 'A4' ? 'bg-white shadow' : ''}`}>A4</button><button onClick={() => setPaperSize('A3')} className={`flex-1 text-xs py-1 rounded ${paperSize === 'A3' ? 'bg-white shadow' : ''}`}>A3</button></div>
                                <div className="flex bg-gray-100 rounded p-1 mb-4"><button onClick={() => setPaperOrientation('portrait')} className={`flex-1 text-xs py-1 rounded ${paperOrientation === 'portrait' ? 'bg-white shadow' : ''}`}>直式</button><button onClick={() => setPaperOrientation('landscape')} className={`flex-1 text-xs py-1 rounded ${paperOrientation === 'landscape' ? 'bg-white shadow' : ''}`}>橫式</button></div>
                                <div className="flex gap-2 mb-2">
                                    <button onClick={() => addBlock('text')} className="flex-1 bg-blue-600 text-white py-2 rounded text-xs shadow flex justify-center gap-1"><Icon name="plus" /> 文字</button>
                                    <button onClick={() => fileInputRef.current.click()} className="flex-1 bg-orange-600 text-white py-2 rounded text-xs shadow flex justify-center gap-1"><Icon name="image" /> 圖片</button>
                                    <button onClick={() => addBlock('grid_list')} className="flex-1 bg-purple-600 text-white py-2 rounded text-xs shadow flex justify-center gap-1 relative" title="新增大表文連續清單區塊">
                                        <Icon name="grid" /> 名單
                                    </button>
                                    <button onClick={() => addBlock('qr_code')} className="flex-1 bg-teal-600 text-white py-2 rounded text-xs shadow flex justify-center gap-1 relative" title="新增自助填單 QR Code">
                                        <Icon name="scan" /> 條碼
                                    </button>
                                </div>
                                <div className="space-y-1">{blocks.map((b, i) => (<div key={b.id} onClick={() => setSelectedId(b.id)} className={`p-2 border rounded flex justify-between bg-white text-xs ${b.locked ? 'bg-gray-50' : ''}`}><span className="truncate w-32">{b.type === 'text' ? b.text : b.type === 'image' ? '圖片' : b.type === 'qr_code' ? 'QR Code' : '網格名單'}</span>{b.locked && <Icon name="lock" size={12} className="text-red-400" />}</div>))}</div>

                                {/* 高級版功能：道教印章與浮水印設定 */}
                                <div className="mt-4 pt-4 border-t">
                                    <div className="text-sm font-bold mb-2 flex justify-between items-center">
                                        <span>道教常用印章 (點擊加入)</span>
                                        <button onClick={() => setSnapToGrid(!snapToGrid)} className={`text-xs px-2 py-1 rounded flex items-center gap-1 ${snapToGrid ? 'bg-blue-100 text-blue-600' : 'bg-gray-100 text-gray-500'}`}><Icon name="grid" size={14} /> {snapToGrid ? '網格吸附 ON' : '網格吸附 OFF'}</button>
                                    </div>
                                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-2 mb-2">
                                        <button onClick={() => addStamp('道經師寶')} className="border rounded p-2 text-xs flex justify-center items-center h-16 bg-red-50 text-red-800 font-bold border-red-200">道經<br />師寶</button>
                                        <button onClick={() => addStamp('太上老君')} className="border rounded p-2 text-xs flex justify-center items-center h-16 bg-red-50 text-red-800 font-bold border-red-200">太上<br />老君</button>
                                        <button onClick={() => addStamp('玄天上帝')} className="border rounded p-2 text-xs flex justify-center items-center h-16 bg-red-50 text-red-800 font-bold border-red-200">玄天<br />上帝</button>
                                        <button onClick={() => addStamp('總制總巡王池府王爺')} className="border rounded p-2 text-[10px] flex justify-center items-center h-16 bg-red-50 text-red-800 font-bold border-red-200">總制總巡<br />池府王爺</button>
                                    </div>
                                    <button onClick={() => watermarkInputRef.current.click()} className="w-full bg-indigo-50 text-indigo-700 py-2 border border-indigo-200 rounded text-xs flex justify-center items-center gap-1"><Icon name="image" size={14} /> 設定全頁防偽浮水印</button>
                                </div>

                                <div className="mt-4 pt-4 border-t">
                                    <div className="text-sm font-bold mb-2 flex justify-between items-center">
                                        <span>💎 高級版：批次自動套印</span>
                                        <button onClick={() => setShowBatchHelp(true)} className="text-blue-600 bg-blue-50 px-2 py-0.5 rounded text-xs">？操作說明</button>
                                    </div>
                                    {batchData.length === 0 ? (
                                        <div className="flex gap-2">
                                            <button onClick={() => csvInputRef.current.click()} className="flex-1 bg-green-50 text-green-700 py-2 border border-green-200 rounded text-xs flex justify-center items-center gap-1 hover:bg-green-100 transition"><Icon name="folder" size={14} /> 本機 CSV</button>
                                            <button onClick={() => setShowGoogleSheetModal(true)} className="flex-1 bg-blue-50 text-blue-700 py-2 border border-blue-200 rounded text-xs flex justify-center items-center gap-1 hover:bg-blue-100 transition"><span className="text-sm">☁️</span> Google Sheets</button>
                                        </div>
                                    ) : (
                                        <div className="text-xs space-y-2">
                                            <div className="flex justify-between items-center bg-green-100 text-green-800 px-2 py-1 rounded">
                                                <span>已載入 {batchData.length} 筆資料</span>
                                                <button onClick={async () => {
                                                    if (confirm('確定要清空目前載入的資料並「同時清除」本機名冊資料庫嗎？')) {
                                                        setBatchData([]);
                                                        setBatchSearchTerm('');
                                                        setBatchPreviewIndex(-1);
                                                        setDbData([]);
                                                        setDbSelectedIndices(new Set());
                                                        setDbHeadersOrder([]);
                                                        await localforage.removeItem('temple_member_db');
                                                        await localforage.removeItem('temple_member_db_headers');
                                                    }
                                                }} className="text-red-600 hover:text-red-800"><Icon name="x" size={14} /></button>
                                            </div>

                                            <input
                                                type="text"
                                                placeholder="🔍 搜尋姓名或資料..."
                                                value={batchSearchTerm}
                                                onChange={e => setBatchSearchTerm(e.target.value)}
                                                className="w-full border p-1.5 rounded focus:outline-none focus:ring-1 focus:ring-blue-500"
                                            />

                                            {filteredBatchData.length === 0 ? (
                                                <div className="text-center text-gray-500 py-2">找不到符合的資料</div>
                                            ) : (
                                                <div className="flex items-center gap-2">
                                                    <button onClick={() => setBatchPreviewIndex(p => Math.max(0, p - 1))} disabled={batchPreviewIndex <= 0} className="px-2 py-1 bg-gray-100 rounded border">上一筆</button>
                                                    <div className="flex-1 flex flex-col items-center">
                                                        <span className="font-bold">預覽：第 {batchPreviewIndex + 1} / {filteredBatchData.length} 筆</span>
                                                        <span className="text-blue-600 font-bold overflow-hidden truncate max-w-[120px]">{filteredBatchData[batchPreviewIndex]?.姓名 || '未命名'}</span>
                                                    </div>
                                                    <button onClick={() => setBatchPreviewIndex(p => Math.min(filteredBatchData.length - 1, p + 1))} disabled={batchPreviewIndex >= filteredBatchData.length - 1} className="px-2 py-1 bg-gray-100 rounded border">下一筆</button>
                                                </div>
                                            )}

                                            <div className="pt-1 bg-white p-2 rounded border border-green-100 shadow-sm">
                                                <p className="text-[10px] text-gray-500 mb-1 font-bold">點擊下方變數快速插入/新增：</p>
                                                <VariableButtonList onInsert={(v) => handleVariableClick(v, activeBlock, updateBlock, addBlock)} batchData={batchData} />
                                            </div>
                                            <p className="text-[10px] text-gray-500 text-center">排版時輸入 <b>{`{{欄位名稱}}`}</b>，系統將自動套用資料。</p>
                                        </div>
                                    )}
                                </div>

                                {batchData.length > 0 ? (
                                    <div className="flex gap-2 mt-4">
                                        <button onClick={() => { setIsBatchPrint(true); setIsSingleBatchPrint(true); setShowPreview(true); }} className="flex-1 bg-indigo-700 hover:bg-indigo-800 text-white py-2 rounded font-bold shadow transition-colors text-xs flex flex-col items-center justify-center">
                                            <span>單筆列印</span><span className="text-[10px] opacity-80">(當前顯示)</span>
                                        </button>
                                        <button onClick={() => { setIsBatchPrint(true); setIsSingleBatchPrint(false); setShowPreview(true); }} className="flex-[1.5] bg-blue-800 hover:bg-blue-900 text-white py-2 rounded font-bold shadow transition-colors text-xs flex flex-col items-center justify-center">
                                            <span>批次全印</span><span className="text-[10px] opacity-80">({filteredBatchData.length}筆)</span>
                                        </button>
                                    </div>
                                ) : (
                                    <button onClick={() => { setIsBatchPrint(false); setIsSingleBatchPrint(false); setShowPreview(true); }} className="w-full bg-gray-800 text-white py-3 rounded font-bold flex items-center justify-center gap-2 mt-4"><Icon name="printer" /> 列印疏文</button>
                                )}
                            </div>
                        )}
                    </div>

                    {/* 縮放鈕 */}
                    <div className="fixed top-4 right-4 z-30 bg-white rounded shadow border flex flex-col p-1 print:hidden">
                        <button onClick={() => { setAutoScale(false); setViewScale(s => Math.min(2, s + 0.1)) }} className="p-2"><Icon name="zoomIn" /></button>
                        <button onClick={() => { setAutoScale(false); setViewScale(s => Math.max(0.2, s - 0.1)) }} className="p-2"><Icon name="zoomOut" /></button>
                        <button onClick={() => setAutoScale(true)} className={`text-[10px] p-1 ${autoScale ? 'text-blue-600' : 'text-gray-500'}`}>AUTO</button>
                    </div>

                    {/* 雲端匯入 Google Sheets Modal */}
                    {showGoogleSheetModal && (
                        <div className="fixed inset-0 z-50 bg-black bg-opacity-50 flex items-center justify-center p-4 print:hidden">
                            <div className="bg-white rounded-xl p-6 max-w-lg w-full shadow-2xl relative">

                                <h3 className="font-border text-xl text-blue-800 mb-4 flex items-center gap-2 font-bold"><Icon name="cloud" size={24} /> ☁️ Google 雲端匯入</h3>

                                <div className="space-y-6">
                                    <div className="bg-gray-50 border border-gray-200 rounded-lg p-5">
                                        <p className="text-sm text-gray-700 mb-3 block">直接輸入您的 Google 試算表共用網址，表單權限需設為「知道連結的任何人」。</p>
                                        <input
                                            type="text"
                                            placeholder="https://docs.google.com/spreadsheets/d/..."
                                            value={googleSheetUrl}
                                            onChange={(e) => setGoogleSheetUrl(e.target.value)}
                                            className="w-full border p-2.5 rounded mb-3 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400"
                                        />
                                        <div className="flex justify-end gap-2">
                                            <button onClick={() => setShowGoogleSheetModal(false)} className="px-5 py-2 border rounded hover:bg-gray-100 text-sm font-bold text-gray-600 transition">取消</button>
                                            <button
                                                onClick={handleLoadGoogleSheet}
                                                disabled={isGoogleSheetLoading}
                                                className={`px-5 py-2 rounded text-white text-sm font-bold flex items-center gap-2 shadow-sm transition ${isGoogleSheetLoading ? 'bg-gray-400 cursor-not-allowed' : 'bg-gray-800 hover:bg-gray-900'}`}
                                            >
                                                {isGoogleSheetLoading ? '讀取中...' : '確認匯入網址'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 編輯器畫布 */}
                    <div className="flex-1 bg-gray-200 overflow-hidden relative print:hidden" onClick={handlePaperClick}>
                        {/* 套印資料狀態提示 */}
                        {batchData.length > 0 && batchPreviewIndex >= 0 && (
                            <div className="absolute top-4 left-1/2 -translate-x-1/2 z-30 bg-blue-600 text-white px-4 py-2 rounded-full shadow-lg flex items-center gap-2 animate-bounce print:hidden">
                                <Icon name="check" color="white" size={16} />
                                <span className="font-bold">預覽模式：正在套用 {batchData[batchPreviewIndex]?.姓名 || '未命名'} 的資料</span>
                            </div>
                        )}
                        <div className="absolute inset-0 flex flex-col items-center justify-start pt-8 pb-32 overflow-auto">

                            <div ref={paperRef} onContextMenu={e => handleContextMenu(e, null)} onTouchStart={e => handlePaperTouchStart(e, null)} onDoubleClick={handlePaperDoubleClick}
                                className="paper-bg relative shadow-2xl"
                                style={{ ...paperStyle }}>

                                {guides.map((g, i) => <div key={i} className="absolute bg-cyan-400 z-50 pointer-events-none" style={{ left: g.type === 'v' ? `${g.pos}%` : 0, top: g.type === 'h' ? `${g.pos}%` : 0, width: g.type === 'v' ? '1px' : '100%', height: g.type === 'h' ? '1px' : '100%' }} />)}

                                {/* 高級版 V2：摺紙輔助線 */}
                                {showFoldGuides && !showPreview && Array.from({ length: foldCount - 1 }).map((_, i) => {
                                    const pos = ((i + 1) / foldCount) * 100;
                                    return (
                                        <div key={`fold-${i}`} className="absolute top-0 h-full border-r border-dashed border-red-400 pointer-events-none print:hidden z-30 opacity-60" style={{ left: `${pos}%` }} />
                                    );
                                })}

                                <PaperContent
                                    blocks={currentBlocksDisplay}
                                    selectedId={selectedId}
                                    showPreview={false}
                                    batchData={batchData}
                                    onMouseDown={handleMouseDown}
                                    onTouchStart={handleTouchStart}
                                    onContextMenu={handleContextMenu}
                                />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
