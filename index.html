<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>道教疏文排版系統 (網頁版)</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel 用於瀏覽器內編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 全局字體設定 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        
        body { 
            font-family: "KaiTi", "BiauKai", "DFKai-SB", "標楷體", "Noto Serif TC", serif; 
            overscroll-behavior: none; /* 防止手機下拉重整 */
        }

        /* 隱藏捲軸但保留功能 */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 列印樣式控制 */
        @media print {
            @page { margin: 0; }
            body { 
                background: white; 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact;
            }
            .print\:hidden { display: none !important; }
            
            /* 列印時強制歸零與去背 */
            .paper-bg { 
                position: absolute !important;
                top: 0 !important; left: 0 !important;
                /* 尺寸由 JS 動態注入 */
                transform: none !important;
                background-color: transparent !important;
                box-shadow: none !important;
                margin: 0 !important;
                overflow: hidden !important;
            }
        }
    </style>
</head>
<body class="bg-gray-200 h-screen w-screen overflow-hidden select-none touch-none text-gray-800">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- 圖示元件 ---
        const Icon = ({ name, size = 18, color = "currentColor", className = "" }) => {
            const paths = {
                printer: <><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></>,
                settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
                reset: <><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></>,
                check: <polyline points="20 6 9 17 4 12"/>,
                menu: <><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></>,
                edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
                copy: <><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>,
                paste: <><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></>,
                layout: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></>,
                zoomIn: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></>,
                zoomOut: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></>,
                layers: <><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></>,
                plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                lock: <><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
                unlock: <><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></>,
                image: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>,
                x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
                chevronUp: <polyline points="18 15 12 9 6 15"/>,
                chevronDown: <polyline points="6 9 12 15 18 9"/>,
                arrowRight: <><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>,
                arrowDown: <><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></>
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{paths[name] || null}</svg>;
        };

        // --- 共用：紙張內容渲染器 ---
        const PaperContent = ({ blocks, selectedId, showPreview, onMouseDown, onTouchStart, onContextMenu }) => {
            return (
                <React.Fragment>
                    {blocks.map((block) => (
                        <div
                            key={block.id}
                            id={`block-${block.id}`}
                            onMouseDown={(e) => onMouseDown && onMouseDown(e, block.id)}
                            onTouchStart={(e) => onTouchStart && onTouchStart(e, block.id)}
                            onContextMenu={(e) => onContextMenu && onContextMenu(e, block.id)}
                            className={`absolute p-1 z-10 
                                ${!showPreview && block.locked ? 'border border-transparent' : ''}
                                ${!showPreview && !block.locked ? 'cursor-move' : ''} 
                                ${!showPreview && selectedId === block.id && !block.locked ? 'outline outline-2 outline-blue-600' : ''}
                            `}
                            style={{
                                left: `${block.x}%`,
                                top: `${block.y}%`,
                                width: block.type === 'image' ? `${block.width}px` : 'auto',
                                fontSize: block.type === 'text' ? `${block.fontSize}px` : undefined,
                                fontWeight: block.fontWeight,
                                color: block.color,
                                writingMode: block.writingMode,
                                whiteSpace: 'pre-wrap',
                                lineHeight: block.lineHeight || '1.5',
                                opacity: block.opacity || 1,
                                userSelect: 'none',
                                WebkitUserSelect: 'none',
                                fontFamily: '"KaiTi", "BiauKai", "DFKai-SB", "楷體", serif'
                            }}
                        >
                            {block.type === 'text' ? block.text : (
                                <img src={block.src} alt="content" className="w-full h-auto pointer-events-none select-none" />
                            )}
                            
                            {!showPreview && block.locked && (
                                <div className="absolute -top-2 -right-2 bg-white rounded-full p-0.5 shadow print:hidden">
                                    <Icon name="lock" color="#ef4444" size={14} />
                                </div>
                            )}
                        </div>
                    ))}
                    
                    {!showPreview && (
                        <div className="absolute inset-4 border-4 border-double border-red-800 pointer-events-none opacity-50 z-0"></div>
                    )}
                </React.Fragment>
            );
        };

        const App = () => {
            // --- 初始位置設定 (更分散) ---
            const initialBlocks = [
                { id: 't1', type: 'text', text: "祈福消災文疏", x: 88, y: 15, fontSize: 48, writingMode: 'vertical-rl', color: '#b91c1c', fontWeight: 'bold', locked: false },
                { id: 't2', type: 'text', text: "伏以", x: 80, y: 18, fontSize: 24, writingMode: 'vertical-rl', color: '#000000', fontWeight: 'normal', locked: false },
                { id: 't3', type: 'text', text: "神恩浩蕩，澤被蒼生。\n今據\n居住於 台灣省OO市\n信士 OOO \n虔備香花果品。\n敢昭告於\n三清道祖 案前曰：\n誠惶誠恐，稽首頓首。\n伏願\n神光普照，元辰光彩。\n謹疏上聞。", x: 50, y: 18, fontSize: 24, writingMode: 'vertical-rl', color: '#000000', fontWeight: 'normal', lineHeight: '2em', locked: false },
                { id: 't4', type: 'text', text: "天運歲次 甲辰 年 正 月 十五 日", x: 18, y: 55, fontSize: 20, writingMode: 'vertical-rl', color: '#000000', fontWeight: 'normal', locked: false },
                { id: 't5', type: 'text', text: "具疏叩謝", x: 8, y: 75, fontSize: 20, writingMode: 'vertical-rl', color: '#000000', fontWeight: 'normal', locked: false }
            ];

            const [blocks, setBlocks] = useState(initialBlocks);
            const [selectedId, setSelectedId] = useState(null);
            const [paperOrientation, setPaperOrientation] = useState('landscape'); // 預設橫式
            const [paperSize, setPaperSize] = useState('A4');
            const [viewScale, setViewScale] = useState(0.5); 
            const [autoScale, setAutoScale] = useState(true);
            const [isToolsOpen, setIsToolsOpen] = useState(true);
            const [activeTab, setActiveTab] = useState('layers');
            const [clipboard, setClipboard] = useState(null);
            const [showPreview, setShowPreview] = useState(false);
            const [guides, setGuides] = useState([]); 
            const [contextMenu, setContextMenu] = useState({ visible: false, x: 0, y: 0, blockId: null, isBackground: false });
            
            const [isDragging, setIsDragging] = useState(false);
            const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
            const paperRef = useRef(null);
            const previewContainerRef = useRef(null); 
            const fileInputRef = useRef(null);
            const touchStartRef = useRef({ x: 0, y: 0, time: 0 });
            const longPressTimer = useRef(null);

            const getDims = () => {
                const w = paperSize === 'A3' ? 297 : 210;
                const h = paperSize === 'A3' ? 420 : 297;
                return paperOrientation === 'portrait' ? { w, h } : { w: h, h: w };
            };
            const dimsMM = getDims();

            useEffect(() => {
                if (!autoScale || showPreview) return;
                const handleResize = () => {
                    const MM_TO_PX = 3.78; 
                    const targetW = dimsMM.w * MM_TO_PX;
                    const screenW = window.innerWidth;
                    const s = (screenW - 32) / targetW; 
                    setViewScale(Math.min(1.2, Math.max(0.15, s)));
                };
                handleResize();
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, [autoScale, paperOrientation, paperSize, showPreview]);

            const [previewScale, setPreviewScale] = useState(0.5);
            useEffect(() => {
                if (showPreview && previewContainerRef.current) {
                    const MM_TO_PX = 3.78;
                    const containerW = previewContainerRef.current.clientWidth;
                    const paperW = dimsMM.w * MM_TO_PX;
                    const s = (containerW - 32) / paperW; 
                    setPreviewScale(Math.min(1, Math.max(0.2, s)));
                }
            }, [showPreview, dimsMM]);

            const moveBlock = (clientX, clientY) => {
                if (!selectedId || !paperRef.current) return;
                const paperRect = paperRef.current.getBoundingClientRect();
                const rawX = ((clientX - paperRect.left) / paperRect.width) * 100;
                const rawY = ((clientY - paperRect.top) / paperRect.height) * 100;
                let newX = rawX - dragOffset.x;
                let newY = rawY - dragOffset.y;

                const SNAP_DIST = 1.5; 
                let newGuides = [];
                const targets = { x: [50], y: [50] }; 
                
                blocks.forEach(b => {
                    if (b.id !== selectedId) {
                        targets.x.push(b.x);
                        targets.y.push(b.y);
                    }
                });

                let snappedX = false, snappedY = false;
                for (let tx of targets.x) { if (Math.abs(newX - tx) < SNAP_DIST) { newX = tx; newGuides.push({type:'v', pos:tx}); snappedX = true; break; } }
                for (let ty of targets.y) { if (Math.abs(newY - ty) < SNAP_DIST) { newY = ty; newGuides.push({type:'h', pos:ty}); snappedY = true; break; } }

                setGuides(newGuides);
                setBlocks(prev => prev.map(b => b.id === selectedId ? { ...b, x: newX, y: newY } : b));
            };

            const handleStart = (clientX, clientY, id) => {
                const block = blocks.find(b => b.id === id);
                if (!block || !paperRef.current) return;
                setSelectedId(id);
                if (block.locked) return;

                setIsDragging(true);
                const paperRect = paperRef.current.getBoundingClientRect();
                const rawW = paperRect.width / viewScale;
                const rawH = paperRect.height / viewScale;
                const relX = (clientX - paperRect.left) / viewScale;
                const relY = (clientY - paperRect.top) / viewScale;
                const pctX = (relX / rawW) * 100;
                const pctY = (relY / rawH) * 100;

                setDragOffset({ x: pctX - block.x, y: pctY - block.y });
            };

            const handleTouchStart = (e, id) => {
                e.stopPropagation();
                const touch = e.touches[0];
                touchStartRef.current = { x: touch.clientX, y: touch.clientY, time: Date.now() };
                setContextMenu({ ...contextMenu, visible: false });

                longPressTimer.current = setTimeout(() => {
                    setIsDragging(false);
                    setContextMenu({ visible: true, x: touch.clientX, y: touch.clientY, blockId: id, isBackground: !id });
                    if (navigator.vibrate) navigator.vibrate(50);
                }, 600);

                if (id) handleStart(touch.clientX, touch.clientY, id);
                if(window.innerWidth < 768) setIsToolsOpen(false);
            };

            const handleTouchMove = (e) => {
                const touch = e.touches[0];
                if (Math.hypot(touch.clientX - touchStartRef.current.x, touch.clientY - touchStartRef.current.y) > 10) {
                    if (longPressTimer.current) clearTimeout(longPressTimer.current);
                }
                if (!isDragging) return;
                if (e.cancelable) e.preventDefault(); 
                moveBlock(touch.clientX, touch.clientY);
            };

            const handleTouchEnd = () => {
                if (longPressTimer.current) clearTimeout(longPressTimer.current);
                setIsDragging(false);
                setGuides([]);
            };

            const handleMouseDown = (e, id) => {
                if (e.button !== 0) return;
                e.stopPropagation();
                setContextMenu({ ...contextMenu, visible: false });
                handleStart(e.clientX, e.clientY, id);
            };

            const handleContextMenu = (e, id) => {
                e.preventDefault(); e.stopPropagation();
                if(id) setSelectedId(id);
                setContextMenu({ visible: true, x: e.clientX, y: e.clientY, blockId: id, isBackground: !id });
            };

            useEffect(() => {
                const mm = (e) => { if(isDragging) { e.preventDefault(); moveBlock(e.clientX, e.clientY); } };
                const mu = () => { setIsDragging(false); setGuides([]); };
                const tm = (e) => handleTouchMove(e);
                const tu = () => handleTouchEnd();

                if(isDragging) {
                    window.addEventListener('mousemove', mm);
                    window.addEventListener('mouseup', mu);
                    window.addEventListener('touchmove', tm, { passive: false });
                    window.addEventListener('touchend', tu);
                }
                return () => { 
                    window.removeEventListener('mousemove', mm); 
                    window.removeEventListener('mouseup', mu);
                    window.removeEventListener('touchmove', tm);
                    window.removeEventListener('touchend', tu);
                };
            }, [isDragging, selectedId, dragOffset]);

            const updateBlock = (k, v) => setBlocks(p => p.map(b => b.id === selectedId ? { ...b, [k]: v } : b));
            const toggleLock = (id) => setBlocks(p => p.map(b => b.id === id ? { ...b, locked: !b.locked } : b));
            const deleteBlock = () => { if (selectedId && !blocks.find(b=>b.id===selectedId)?.locked) { setBlocks(p => p.filter(b => b.id !== selectedId)); setSelectedId(null); } };
            const addBlock = (type, content='', x=50, y=50) => {
                const newB = { id: `b${Date.now()}`, type, x, y, text: content||'新文字', fontSize: 24, writingMode: paperOrientation==='landscape'?'horizontal-tb':'vertical-rl', color:'#000', locked:false, src:content, width:200, opacity:1 };
                setBlocks([...blocks, newB]); setSelectedId(newB.id);
            };
            const handleImage = (e) => {
                const f = e.target.files[0];
                if (f) { const r = new FileReader(); r.onload = (ev) => { addBlock('image', ev.target.result); setIsToolsOpen(true); setActiveTab('settings'); }; r.readAsDataURL(f); }
                e.target.value = '';
            };
            const handlePaperClick = (e) => {
                if (e.target === paperRef.current || e.target.classList.contains('paper-bg')) {
                    setSelectedId(null);
                    setContextMenu({ ...contextMenu, visible: false });
                }
            };
            const handlePaperTouchStart = (e) => {
                const touch = e.touches[0];
                touchStartRef.current = { x: touch.clientX, y: touch.clientY };
                setContextMenu({ ...contextMenu, visible: false });
                longPressTimer.current = setTimeout(() => {
                    setContextMenu({ visible: true, x: touch.clientX, y: touch.clientY, blockId: null, isBackground: true });
                    if (navigator.vibrate) navigator.vibrate(50);
                }, 800);
            };
            const handlePaperDoubleClick = (e) => {
                if (!paperRef.current) return;
                const rect = paperRef.current.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                addBlock('text', '', x-5, y-2);
            };
            const handleMenuAction = (action, targetId = null) => {
                const targetBlockId = targetId || contextMenu.blockId;
                const targetBlock = blocks.find(b => b.id === targetBlockId);
                switch(action) {
                    case 'addText': if (paperRef.current) { const rect = paperRef.current.getBoundingClientRect(); addBlock('text', '', ((contextMenu.x - rect.left)/rect.width)*100, ((contextMenu.y - rect.top)/rect.height)*100); } break;
                    case 'addImage': fileInputRef.current.click(); break;
                    case 'edit': setSelectedId(targetBlockId); setIsToolsOpen(true); break;
                    case 'copy': if (targetBlock) setClipboard(targetBlock); break;
                    case 'paste': if (clipboard) { const nb={...clipboard,id:`b${Date.now()}`,x:clipboard.x+5,y:clipboard.y+5,locked:false};setBlocks([...blocks,nb]);setSelectedId(nb.id)}; break;
                    case 'delete': if (!targetBlock?.locked) { setBlocks(p=>p.filter(b=>b.id!==targetBlockId)); setSelectedId(null); } else alert('已鎖定'); break;
                    case 'toggleLock': toggleLock(targetBlockId); break;
                    default: break;
                }
                setContextMenu({ ...contextMenu, visible: false });
            };

            const activeBlock = blocks.find(b => b.id === selectedId);

            const paperStyle = {
                width: `${dimsMM.w}mm`,
                height: `${dimsMM.h}mm`,
                backgroundColor: '#fff9c4',
                transform: `scale(${viewScale})`,
                transformOrigin: 'top center',
                boxShadow: '0 4px 10px rgba(0,0,0,0.1)',
                position: 'relative',
                transition: 'transform 0.2s ease-out', 
                flexShrink: 0
            };

            return (
                <div className="h-screen bg-gray-200 flex flex-col md:flex-row overflow-hidden font-sans text-gray-800 select-none touch-none">
                    <input type="file" ref={fileInputRef} accept="image/*" className="hidden" onChange={handleImage} />

                    {/* 列印預覽 Modal */}
                    {showPreview && (
                        <div className="fixed inset-0 z-50 bg-gray-900 bg-opacity-95 flex flex-col items-center justify-center p-4">
                            <div className="bg-white rounded-lg p-4 w-full max-w-xl flex flex-col max-h-[90vh]">
                                <div className="flex justify-between items-center mb-2 pb-2 border-b">
                                    <h3 className="font-bold">預覽 (將印出以下內容)</h3>
                                    <button onClick={()=>setShowPreview(false)}><Icon name="x"/></button>
                                </div>
                                <div ref={previewContainerRef} className="flex-1 overflow-auto bg-gray-300 p-4 flex justify-center items-start">
                                    <div className="bg-white shadow-xl relative origin-top" 
                                            style={{ 
                                                width: `${dimsMM.w}mm`, 
                                                height: `${dimsMM.h}mm`, 
                                                transform: `scale(${previewScale})`,
                                                transformOrigin: 'top center'
                                            }}>
                                        <PaperContent 
                                            blocks={blocks} 
                                            selectedId={null} 
                                            showPreview={true}
                                            onMouseDown={null}
                                            onTouchStart={null}
                                            onContextMenu={null}
                                        />
                                    </div>
                                </div>
                                <div className="mt-4 flex gap-2">
                                    <button onClick={()=>setShowPreview(false)} className="flex-1 py-3 border rounded font-bold">返回修改</button>
                                    <button onClick={()=>{window.print()}} className="flex-1 py-3 bg-blue-600 text-white rounded font-bold flex justify-center gap-2">
                                        <Icon name="printer" color="white"/> 確認列印
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 右鍵選單 */}
                    {contextMenu.visible && (
                        <div className="fixed z-50 bg-white rounded shadow-xl border py-1 min-w-[140px]" style={{ left: Math.min(contextMenu.x, window.innerWidth-150), top: Math.min(contextMenu.y, window.innerHeight-200) }}>
                            {contextMenu.isBackground ? (
                                <>
                                    <button onClick={()=>handleMenuAction('addText')} className="w-full text-left px-4 py-3 hover:bg-blue-50 flex gap-2 text-sm"><Icon name="plus"/> 新增文字</button>
                                    <button onClick={()=>handleMenuAction('addImage')} className="w-full text-left px-4 py-3 hover:bg-blue-50 flex gap-2 text-sm"><Icon name="image"/> 新增圖片</button>
                                    <button onClick={()=>handleMenuAction('paste')} className="w-full text-left px-4 py-3 hover:bg-blue-50 flex gap-2 text-sm" disabled={!clipboard}><Icon name="paste"/> 貼上</button>
                                </>
                            ) : (
                                <>
                                    <button onClick={()=>handleMenuAction('edit')} className="w-full text-left px-4 py-2 hover:bg-blue-50 flex gap-2 text-sm"><Icon name="edit"/> 編輯</button>
                                    <button onClick={()=>handleMenuAction('toggleLock')} className="w-full text-left px-4 py-2 hover:bg-blue-50 flex gap-2 text-sm"><Icon name="lock"/> 鎖定/解鎖</button>
                                    <button onClick={()=>handleMenuAction('copy')} className="w-full text-left px-4 py-2 hover:bg-blue-50 flex gap-2 text-sm"><Icon name="copy"/> 複製</button>
                                    <button onClick={()=>handleMenuAction('delete')} className="w-full text-left px-4 py-2 hover:bg-red-50 text-red-500 flex gap-2 text-sm"><Icon name="trash"/> 刪除</button>
                                </>
                            )}
                        </div>
                    )}
                    {contextMenu.visible && <div className="fixed inset-0 z-40" onClick={()=>setContextMenu({...contextMenu,visible:false})} onTouchStart={()=>setContextMenu({...contextMenu,visible:false})}/>}

                    {/* 左側面板 */}
                    <div className={`bg-white shadow-lg z-20 flex flex-col print:hidden transition-all duration-300 absolute md:relative bottom-0 w-full md:w-80 md:h-full ${isToolsOpen ? 'h-[50vh]' : 'h-12'}`}>
                        <div className="p-3 border-b flex justify-between items-center bg-gray-50 cursor-pointer" onClick={()=>setIsToolsOpen(!isToolsOpen)}>
                            <div className="flex items-center gap-2 font-bold"><Icon name="settings"/> 工具箱</div>
                            <Icon name={isToolsOpen ? "chevronDown" : "chevronUp"} />
                        </div>
                        
                        {isToolsOpen && activeBlock ? (
                            <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                <div className="flex justify-between items-center pb-2 border-b">
                                    <span className="text-blue-600 font-bold flex gap-2 items-center"><Icon name="edit"/> {activeBlock.locked?'鎖定中':'編輯中'}</span>
                                    <div className="flex gap-2">
                                        <button onClick={()=>toggleLock(activeBlock.id)} className={`p-2 rounded ${activeBlock.locked?'bg-red-100':'bg-gray-100'}`}><Icon name={activeBlock.locked?"lock":"unlock"}/></button>
                                        <button onClick={deleteBlock} className="p-2 rounded text-red-500 bg-gray-100" disabled={activeBlock.locked}><Icon name="trash"/></button>
                                    </div>
                                </div>
                                {activeBlock.type === 'text' ? (
                                    <>
                                        <textarea value={activeBlock.text} onChange={e=>updateBlock('text',e.target.value)} rows="3" className="w-full border p-2 rounded" disabled={activeBlock.locked}/>
                                        <div className="flex gap-2"><button onClick={()=>updateBlock('writingMode','horizontal-tb')} className="flex-1 border py-2 rounded text-xs flex justify-center gap-1"><Icon name="arrowRight"/> 橫排</button><button onClick={()=>updateBlock('writingMode','vertical-rl')} className="flex-1 border py-2 rounded text-xs flex justify-center gap-1"><Icon name="arrowDown"/> 直排</button></div>
                                        <div className="flex items-center gap-2"><span className="text-xs">字體</span><input type="range" min="12" max="150" value={activeBlock.fontSize} onChange={e=>updateBlock('fontSize',parseInt(e.target.value))} className="flex-1"/></div>
                                        <label className="flex items-center gap-2"><input type="checkbox" checked={activeBlock.fontWeight==='bold'} onChange={e=>updateBlock('fontWeight',e.target.checked?'bold':'normal')}/> 粗體</label>
                                    </>
                                ) : (
                                    <div className="space-y-3">
                                        <div className="h-20 bg-gray-100 flex justify-center"><img src={activeBlock.src} className="h-full object-contain"/></div>
                                        <div className="flex items-center gap-2"><span className="text-xs">大小</span><input type="range" min="20" max="800" value={activeBlock.width} onChange={e=>updateBlock('width',parseInt(e.target.value))} className="flex-1"/></div>
                                        <div className="flex items-center gap-2"><span className="text-xs">透明</span><input type="range" min="0.1" max="1" step="0.1" value={activeBlock.opacity} onChange={e=>updateBlock('opacity',parseFloat(e.target.value))} className="flex-1"/></div>
                                    </div>
                                )}
                                <button onClick={()=>setSelectedId(null)} className="w-full py-2 bg-green-600 text-white rounded font-bold">完成</button>
                            </div>
                        ) : isToolsOpen && (
                            <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                <div className="flex bg-gray-100 rounded p-1 mb-2"><button onClick={()=>setPaperSize('A4')} className={`flex-1 text-xs py-1 rounded ${paperSize==='A4'?'bg-white shadow':''}`}>A4</button><button onClick={()=>setPaperSize('A3')} className={`flex-1 text-xs py-1 rounded ${paperSize==='A3'?'bg-white shadow':''}`}>A3</button></div>
                                <div className="flex bg-gray-100 rounded p-1 mb-4"><button onClick={()=>setPaperOrientation('portrait')} className={`flex-1 text-xs py-1 rounded ${paperOrientation==='portrait'?'bg-white shadow':''}`}>直式</button><button onClick={()=>setPaperOrientation('landscape')} className={`flex-1 text-xs py-1 rounded ${paperOrientation==='landscape'?'bg-white shadow':''}`}>橫式</button></div>
                                <div className="flex gap-2 mb-2"><button onClick={()=>addBlock('text')} className="flex-1 bg-blue-600 text-white py-2 rounded text-xs shadow flex justify-center gap-1"><Icon name="plus"/> 文字</button><button onClick={()=>fileInputRef.current.click()} className="flex-1 bg-orange-600 text-white py-2 rounded text-xs shadow flex justify-center gap-1"><Icon name="image"/> 圖片</button></div>
                                <div className="space-y-1">{blocks.map((b,i)=>(<div key={b.id} onClick={()=>setSelectedId(b.id)} className={`p-2 border rounded flex justify-between bg-white text-xs ${b.locked?'bg-gray-50':''}`}><span className="truncate w-32">{b.type==='text'?b.text: '圖片'}</span>{b.locked && <Icon name="lock" size={12} className="text-red-400"/>}</div>))}</div>
                                <button onClick={()=>setShowPreview(true)} className="w-full bg-gray-800 text-white py-3 rounded font-bold flex items-center justify-center gap-2 mt-4"><Icon name="printer"/> 列印疏文</button>
                            </div>
                        )}
                    </div>

                    {/* 縮放鈕 */}
                    <div className="fixed top-4 right-4 z-30 bg-white rounded shadow border flex flex-col p-1 print:hidden">
                        <button onClick={()=>{setAutoScale(false);setViewScale(s=>Math.min(2,s+0.1))}} className="p-2"><Icon name="zoomIn"/></button>
                        <button onClick={()=>{setAutoScale(false);setViewScale(s=>Math.max(0.2,s-0.1))}} className="p-2"><Icon name="zoomOut"/></button>
                        <button onClick={()=>setAutoScale(true)} className={`text-[10px] p-1 ${autoScale?'text-blue-600':'text-gray-500'}`}>AUTO</button>
                    </div>

                    {/* 編輯器畫布 */}
                    <div className="flex-1 bg-gray-200 overflow-hidden relative" onClick={handlePaperClick}>
                        <div className="absolute inset-0 flex justify-center items-start pt-10 overflow-auto">
                            <div ref={paperRef} onContextMenu={e=>handleContextMenu(e,null)} onTouchStart={e=>handlePaperTouchStart(e,null)} onDoubleClick={handlePaperDoubleClick}
                                className="paper-bg relative shadow-2xl" 
                                style={{ ...paperStyle }}>
                                
                                {guides.map((g, i) => <div key={i} className="absolute bg-cyan-400 z-50 pointer-events-none" style={{ left: g.type==='v'?`${g.pos}%`:0, top: g.type==='h'?`${g.pos}%`:0, width: g.type==='v'?'1px':'100%', height: g.type==='h'?'1px':'100%' }}/>)}
                                
                                <PaperContent 
                                    blocks={blocks} 
                                    selectedId={selectedId} 
                                    showPreview={false}
                                    onMouseDown={handleMouseDown}
                                    onTouchStart={handleTouchStart}
                                    onContextMenu={handleContextMenu}
                                />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
